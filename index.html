<!DOCTYPE html>
<html lang="ku" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurdAgencyLink | پڕۆفایلی زیرەک</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; scroll-behavior: smooth; }
        .glass-morphism { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .preview-scroll::-webkit-scrollbar { width: 3px; }
        .preview-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="bg-[#050505] text-gray-200 min-h-screen">

    <div id="public-profile-view" class="hidden min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-black via-[#0a0a0a] to-[#111]">
        <div class="w-full max-w-[400px] flex flex-col items-center animate-fade">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-green-500 to-emerald-600 rounded-full blur opacity-25 group-hover:opacity-50 transition"></div>
                <img id="pub-img" src="" class="relative w-28 h-28 rounded-full border-2 border-white/10 object-cover shadow-2xl">
                <div id="pub-badge" class="absolute bottom-1 right-1 w-7 h-7 rounded-full flex items-center justify-center border-2 border-[#050505] shadow-xl"></div>
            </div>
            
            <h1 id="pub-name" class="mt-6 text-2xl font-bold tracking-tight"></h1>
            <p id="pub-bio" class="mt-2 text-sm text-gray-400 font-medium px-6 text-center leading-relaxed"></p>

            <div id="pub-links-container" class="w-full mt-10 space-y-4">
                </div>

            <div class="mt-16 flex flex-col items-center gap-2 opacity-40">
                <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center text-white font-black text-xs">K</div>
                <span class="text-[10px] font-bold tracking-[0.2em]">KURD AGENCY LINK</span>
            </div>
        </div>
    </div>

    <div id="main-app-ui">
        <header class="p-5 border-b border-white/5 bg-black/50 backdrop-blur-md sticky top-0 z-50">
            <div class="container mx-auto max-w-6xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-green-500/20 font-black text-xl">K</div>
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">KurdAgency<span class="text-green-500">Link</span></span>
                </div>
                <button id="logout-btn" onclick="logout()" class="hidden px-5 py-2 bg-red-500/10 text-red-500 border border-red-500/20 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all">چوونەدەرەوە</button>
            </div>
        </header>

        <main class="container mx-auto px-4 py-10 max-w-6xl">
            <section id="auth-section" class="max-w-md mx-auto glass-morphism p-8 rounded-[2.5rem] shadow-2xl">
                <div class="flex bg-white/5 p-1 rounded-2xl mb-8">
                    <button onclick="switchAuth('login')" id="tab-login" class="flex-1 py-3 rounded-xl font-bold text-sm bg-green-500 text-white shadow-lg">چوونەژوورەوە</button>
                    <button onclick="switchAuth('reg')" id="tab-reg" class="flex-1 py-3 rounded-xl font-bold text-sm text-gray-400">هەژماری نوێ</button>
                </div>

                <form id="login-form" onsubmit="doLogin(event)" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 mr-2 uppercase">ئیمێڵ یان بەکارهێنەر</label>
                        <input type="text" id="l-user" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-green-500 transition">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 mr-2 uppercase">پاسۆرد</label>
                        <input type="password" id="l-pass" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-green-500 transition">
                    </div>
                    <button class="w-full bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl font-bold shadow-xl shadow-green-500/20 transition-all mt-4">بچۆ ژوورەوە</button>
                </form>

                <form id="reg-form" onsubmit="doRegister(event)" class="space-y-4 hidden">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="r-fn" placeholder="ناوی یەکەم" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none">
                        <input type="text" id="r-ln" placeholder="ناوی دووەم" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none">
                    </div>
                    <input type="text" id="r-user" placeholder="یوزەرنەیمی تایبەت" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none">
                    <input type="password" id="r-pass" placeholder="پاسۆرد" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none">
                    <button class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold shadow-xl transition-all">دروستکردن</button>
                </form>
            </section>

            <section id="admin-panel" class="hidden space-y-8 animate-fade">
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 glass-morphism p-8 rounded-[2.5rem]">
                        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><i class="fas fa-users-cog text-blue-500"></i> لیستی هەموو بەکارهێنەران</h2>
                        <div id="admin-list" class="space-y-4 max-h-[500px] overflow-y-auto preview-scroll pr-2"></div>
                    </div>
                    <div class="space-y-6">
                        <div class="bg-blue-600 p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                            <i class="fas fa-shield-alt absolute -right-4 -bottom-4 text-8xl opacity-20"></i>
                            <h3 class="text-xl font-bold">کۆنترۆڵی مۆر</h3>
                            <p class="text-xs opacity-80 mt-2 mb-6">لێرە مۆری شین بدە بەو کەسانەی پارەیان ناردووە</p>
                            <input type="text" id="adm-u" placeholder="یوزەرنەیم" class="w-full p-3 bg-white/20 border border-white/30 rounded-xl outline-none placeholder:text-white/50 mb-3">
                            <select id="adm-t" class="w-full p-3 bg-white/20 border border-white/30 rounded-xl outline-none mb-4">
                                <option value="verified">Verified (Blue)</option>
                                <option value="gold">Business (Gold)</option>
                                <option value="star">Celebrity (Purple)</option>
                            </select>
                            <button onclick="giveBadge(true)" class="w-full bg-white text-blue-600 py-3 rounded-xl font-bold mb-2">بەخشینی مۆر</button>
                            <button onclick="giveBadge(false)" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold">سڕینەوەی مۆر</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="user-panel" class="hidden grid lg:grid-cols-2 gap-10 animate-fade">
                <div class="space-y-6">
                    <div class="glass-morphism p-8 rounded-[2.5rem]">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-500 text-xl"><i class="fas fa-pen"></i></div>
                            <h2 class="text-xl font-bold">زانیارییەکانت</h2>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-center gap-4 p-4 bg-white/5 rounded-2xl">
                                <input type="file" id="img-input" onchange="processImg(event)" class="hidden">
                                <label for="img-input" class="cursor-pointer bg-green-500 text-white px-4 py-2 rounded-xl text-xs font-bold">گۆڕینی وێنە</label>
                                <div class="flex-1 flex items-center gap-2">
                                    <span class="text-[10px] opacity-50 uppercase">قەبارە:</span>
                                    <input type="range" min="60" max="140" value="100" oninput="syncData()" id="u-size" class="flex-1 accent-green-500">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="u-fn" oninput="syncData()" placeholder="ناو" class="p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-green-500">
                                <input type="text" id="u-ln" oninput="syncData()" placeholder="نازناو" class="p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-green-500">
                            </div>
                            <textarea id="u-bio" oninput="syncData()" placeholder="باسی خۆت یان کارت بکە..." class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none h-24 focus:border-green-500"></textarea>
                        </div>
                    </div>

                    <div class="glass-morphism p-8 rounded-[2.5rem]">
                        <h2 class="text-xl font-bold mb-6">لیستی بەستەرەکان</h2>
                        <div class="flex gap-2 mb-6">
                            <select id="link-select" class="flex-1 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none">
                                <option value="fb">Facebook</option>
                                <option value="ig">Instagram</option>
                                <option value="sc">Snapchat</option>
                                <option value="tt">TikTok</option>
                                <option value="wa">WhatsApp</option>
                                <option value="web">Website</option>
                            </select>
                            <button onclick="addLinkRow()" class="bg-green-500 text-white px-8 rounded-2xl font-bold shadow-lg shadow-green-500/20 transition-all hover:scale-105">+</button>
                        </div>
                        <div id="links-input-area" class="space-y-3"></div>
                    </div>

                    <div class="p-2">
                        <button onclick="finalizeLink()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white p-5 rounded-[2rem] font-bold text-lg shadow-2xl shadow-green-500/20 hover:scale-[1.02] active:scale-95 transition-all">دروستکردنی لینک</button>
                        <div id="link-result" class="hidden mt-6 p-6 glass-morphism rounded-3xl border border-green-500/30 animate-fade">
                            <p class="text-xs text-gray-400 mb-2 mr-2 uppercase font-bold">لینکی تایبەتی تۆ:</p>
                            <div class="flex items-center justify-between gap-4">
                                <code id="final-url-text" class="text-green-500 font-mono text-sm overflow-hidden text-ellipsis whitespace-nowrap"></code>
                                <button onclick="copyToClip()" class="bg-green-500 text-white px-6 py-2 rounded-xl text-xs font-bold">کۆپی</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="hidden lg:flex justify-center sticky top-28 h-fit">
                    <div class="w-[320px] h-[640px] bg-black rounded-[3rem] border-[8px] border-[#1a1a1a] shadow-[0_0_60px_rgba(0,0,0,0.5)] overflow-hidden relative">
                        <div id="preview-inner" class="w-full h-full p-6 flex flex-col items-center bg-[#050505] overflow-y-auto preview-scroll">
                            <div class="mt-10 relative">
                                <img id="p-img" src="https://ui-avatars.com/api/?name=User&background=10b981&color=fff" class="rounded-full border-2 border-white/10 object-cover shadow-2xl">
                                <div id="p-badge" class="hidden absolute bottom-0 right-0 w-6 h-6 rounded-full flex items-center justify-center border-2 border-[#050505] shadow-lg"></div>
                            </div>
                            <h2 id="p-name" class="mt-4 font-bold text-lg">Username</h2>
                            <p id="p-bio" class="mt-1 text-[10px] text-gray-500 text-center px-4"></p>
                            <div id="p-links" class="w-full mt-8 space-y-3"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- وەک ئەندازیارێک، لێرە سیستەمی داتابەیس ڕێکدەخەین ---
        const ARYAN_ADMIN = { user: "aryan@gmail.com", pass: "aryan12345" };
        if(!localStorage.getItem('klink_pro')) localStorage.setItem('klink_pro', JSON.stringify({}));
        let db = JSON.parse(localStorage.getItem('klink_pro'));
        let activeUser = null;

        // --- سیستەمی ڕۆتینگ (بۆ ئەوەی لینکەکان ئیش بکەن) ---
        const urlParams = new URLSearchParams(window.location.search);
        const profileRequest = urlParams.get('u');

        if(profileRequest && db[profileRequest]) {
            showPublicProfile(profileRequest);
        }

        function showPublicProfile(uName) {
            document.getElementById('main-app-ui').remove();
            document.getElementById('public-profile-view').classList.remove('hidden');
            const data = db[uName];
            
            document.getElementById('pub-img').src = data.img || `https://ui-avatars.com/api/?name=${data.fn}&background=10b981&color=fff`;
            document.getElementById('pub-img').style.width = data.imgSize + "px";
            document.getElementById('pub-img').style.height = data.imgSize + "px";
            document.getElementById('pub-name').innerText = `${data.fn} ${data.ln}`;
            document.getElementById('pub-bio').innerText = data.bio;

            const badge = document.getElementById('pub-badge');
            if(data.badge) {
                badge.classList.remove('hidden');
                if(data.badge === 'verified') badge.innerHTML = '<i class="fas fa-check text-[10px] text-white"></i>', badge.className = "absolute bottom-1 right-1 w-7 h-7 rounded-full flex items-center justify-center bg-blue-500 border-2 border-[#050505]";
                else if(data.badge === 'gold') badge.innerHTML = '<i class="fas fa-check text-[10px] text-black"></i>', badge.className = "absolute bottom-1 right-1 w-7 h-7 rounded-full flex items-center justify-center bg-yellow-400 border-2 border-[#050505]";
                else badge.innerHTML = '<i class="fas fa-star text-[10px] text-white"></i>', badge.className = "absolute bottom-1 right-1 w-7 h-7 rounded-full flex items-center justify-center bg-purple-500 border-2 border-[#050505]";
            } else badge.classList.add('hidden');

            const container = document.getElementById('pub-links-container');
            for(let key in data.links) {
                if(data.links[key]) {
                    container.innerHTML += `
                        <a href="${data.links[key]}" target="_blank" class="block w-full p-4 glass-morphism rounded-2xl text-center font-bold hover:bg-white/10 transition-all active:scale-95 border border-white/5">
                            ${key.toUpperCase()}
                        </a>`;
                }
            }
        }

        // --- فانکشنەکانی ناو ئەپەکە ---
        function switchAuth(mode) {
            document.getElementById('login-form').classList.toggle('hidden', mode === 'reg');
            document.getElementById('reg-form').classList.toggle('hidden', mode === 'login');
            document.getElementById('tab-login').className = mode === 'login' ? 'flex-1 py-3 rounded-xl font-bold text-sm bg-green-500 text-white shadow-lg' : 'flex-1 py-3 text-gray-400 font-bold';
            document.getElementById('tab-reg').className = mode === 'reg' ? 'flex-1 py-3 rounded-xl font-bold text-sm bg-green-500 text-white shadow-lg' : 'flex-1 py-3 text-gray-400 font-bold';
        }

        function doRegister(e) {
            e.preventDefault();
            const u = document.getElementById('r-user').value.toLowerCase().trim();
            if(db[u] || u === 'aryan') return alert("ئەم ناوە ناکرێت!");
            db[u] = {
                fn: document.getElementById('r-fn').value,
                ln: document.getElementById('r-ln').value,
                pass: document.getElementById('r-pass').value,
                bio: "بەخێربێیت بۆ پڕۆفایلەکەم", img: "", badge: null, links: {}, imgSize: 100
            };
            save();
            alert("هەژمارەکەت بە سەرکەوتوویی دروستکرا!");
            switchAuth('login');
        }

        function doLogin(e) {
            e.preventDefault();
            const u = document.getElementById('l-user').value.toLowerCase().trim();
            const p = document.getElementById('l-pass').value;

            if(u === ARYAN_ADMIN.user && p === ARYAN_ADMIN.pass) return showAdminSection();

            if(db[u] && db[u].pass === p) {
                activeUser = u;
                showUserSection();
            } else alert("زانیارییەکان هەڵەن!");
        }

        function showAdminSection() {
            document.getElementById('auth-section').remove();
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            renderAdminList();
        }

        function renderAdminList() {
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            for(let user in db) {
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                        <div>
                            <p class="font-bold text-green-500">${user}</p>
                            <p class="text-[10px] text-gray-500">${db[user].fn} ${db[user].ln}</p>
                        </div>
                        <div class="text-xs font-bold px-3 py-1 bg-white/10 rounded-full">${db[user].badge || 'Regular'}</div>
                    </div>`;
            }
        }

        function giveBadge(give) {
            const u = document.getElementById('adm-u').value.toLowerCase().trim();
            const t = document.getElementById('adm-t').value;
            if(!db[u]) return alert("بەکارهێنەر نییە!");
            db[u].badge = give ? t : null;
            save();
            alert("کردارەکە جێبەجێ کرا!");
            renderAdminList();
        }

        function showUserSection() {
            document.getElementById('auth-section').remove();
            document.getElementById('user-panel').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            const data = db[activeUser];
            document.getElementById('u-fn').value = data.fn;
            document.getElementById('u-ln').value = data.ln;
            document.getElementById('u-bio').value = data.bio;
            document.getElementById('u-size').value = data.imgSize;
            renderInputLinks();
            syncData();
        }

        function processImg(e) {
            const r = new FileReader();
            r.onload = () => { db[activeUser].img = r.result; save(); syncData(); };
            r.readAsDataURL(e.target.files[0]);
        }

        function addLinkRow() {
            const type = document.getElementById('link-select').value;
            if(!db[activeUser].links[type]) {
                db[activeUser].links[type] = "";
                save();
                renderInputLinks();
                syncData();
            }
        }

        function renderInputLinks() {
            const container = document.getElementById('links-input-area');
            container.innerHTML = "";
            for(let k in db[activeUser].links) {
                container.innerHTML += `
                    <div class="flex gap-2 animate-fade">
                        <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center text-[10px] font-bold uppercase">${k}</div>
                        <input type="text" value="${db[activeUser].links[k]}" oninput="updateLinkVal('${k}', this.value)" placeholder="لینکەکە لێرە دابنێ" class="flex-1 p-3 bg-white/5 border border-white/10 rounded-xl text-xs outline-none focus:border-green-500">
                        <button onclick="delLink('${k}')" class="text-red-500 px-2"><i class="fas fa-trash"></i></button>
                    </div>`;
            }
        }

        function updateLinkVal(k, v) { db[activeUser].links[k] = v; save(); syncData(); }
        function delLink(k) { delete db[activeUser].links[k]; save(); renderInputLinks(); syncData(); }

        function syncData() {
            const data = db[activeUser];
            data.fn = document.getElementById('u-fn').value;
            data.ln = document.getElementById('u-ln').value;
            data.bio = document.getElementById('u-bio').value;
            data.imgSize = document.getElementById('u-size').value;
            save();

            // Update Preview
            document.getElementById('p-name').innerText = `${data.fn} ${data.ln}`;
            document.getElementById('p-bio').innerText = data.bio;
            const pImg = document.getElementById('p-img');
            pImg.src = data.img || `https://ui-avatars.com/api/?name=${data.fn}&background=10b981&color=fff`;
            pImg.style.width = data.imgSize + "px";
            pImg.style.height = data.imgSize + "px";

            const badge = document.getElementById('p-badge');
            if(data.badge) {
                badge.classList.remove('hidden');
                badge.className = `absolute bottom-0 right-0 w-6 h-6 rounded-full flex items-center justify-center border-2 border-[#050505] shadow-lg ${data.badge === 'verified' ? 'bg-blue-500' : data.badge === 'gold' ? 'bg-yellow-400' : 'bg-purple-500'}`;
                badge.innerHTML = data.badge === 'star' ? '<i class="fas fa-star text-[8px] text-white"></i>' : `<i class="fas fa-check text-[8px] ${data.badge === 'gold' ? 'text-black' : 'text-white'}"></i>`;
            } else badge.classList.add('hidden');

            const pLinks = document.getElementById('p-links');
            pLinks.innerHTML = "";
            for(let key in data.links) {
                if(data.links[key]) pLinks.innerHTML += `<div class="w-full py-3 bg-green-500 text-white rounded-xl text-center text-[10px] font-bold shadow-lg">${key.toUpperCase()}</div>`;
            }
        }

        function finalizeLink() {
            const baseUrl = window.location.href.split('?')[0];
            const final = `${baseUrl}?u=${activeUser}`;
            document.getElementById('final-url-text').innerText = final;
            document.getElementById('link-result').classList.remove('hidden');
        }

        function copyToClip() {
            navigator.clipboard.writeText(document.getElementById('final-url-text').innerText);
            alert("لینکەکەت کۆپی کرا! ئێستا دەتوانیت لە بایۆی سۆشیاڵ میدیاکانت دایبنێیت.");
        }

        function save() { localStorage.setItem('klink_pro', JSON.stringify(db)); }
        function logout() { location.href = window.location.href.split('?')[0]; }
    </script>
</body>
</html>
