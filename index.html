<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurdAgency Pro | ئاریان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; transition: 0.3s; overflow-x: hidden; }
        .dark { background-color: #050505; color: white; }
        .light { background-color: #f1f5f9; color: #1e293b; }
        
        /* Mobile Frame Styling */
        .phone-frame { width: 300px; height: 600px; border: 10px solid #1a1a1a; border-radius: 3rem; position: relative; overflow-y: auto; background: #000; }
        
        /* Sidebar/Menu Animation */
        #side-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #side-menu.active { transform: translateX(0); }

        /* Multi-Design Templates */
        .design-card { cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .design-card:hover { transform: scale(1.05); }
        .design-selected { border-color: #22c55e !important; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }
    </style>
</head>
<body class="dark min-h-screen">

    <nav class="p-4 border-b border-white/5 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-lg z-[60]">
        <div class="flex items-center gap-3">
            <button onclick="toggleMenu()" class="text-2xl p-2"><i class="fas fa-bars text-green-500"></i></button>
            <span class="text-xl font-bold italic">KurdAgency<span class="text-green-500">Link</span></span>
        </div>
        <div class="flex items-center gap-2">
            <div id="admin-indicator" class="hidden px-3 py-1 bg-blue-500 text-[10px] rounded-full font-bold">ADMIN</div>
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-white/5"><i class="fas fa-moon text-yellow-500"></i></button>
        </div>
    </nav>

    <div id="side-menu" class="fixed top-0 right-0 h-full w-72 bg-[#0d0d0d] border-l border-white/10 z-[100] p-6 shadow-2xl">
        <button onclick="toggleMenu()" class="mb-10 text-xl"><i class="fas fa-times"></i></button>
        <div class="space-y-6">
            <button onclick="switchTab('projects')" class="w-full text-right p-4 rounded-2xl hover:bg-green-500/10 flex items-center gap-3"><i class="fas fa-tasks text-green-500"></i> پڕۆژەکانم</button>
            <button onclick="switchTab('designs')" class="w-full text-right p-4 rounded-2xl hover:bg-green-500/10 flex items-center gap-3"><i class="fas fa-palette text-blue-500"></i> دیزاینەکان</button>
            <button onclick="switchTab('profile')" class="w-full text-right p-4 rounded-2xl hover:bg-green-500/10 flex items-center gap-3"><i class="fas fa-user-circle text-purple-500"></i> پڕۆفایل</button>
            <div class="border-t border-white/5 my-4"></div>
            <button onclick="logout()" class="w-full text-right p-4 rounded-2xl text-red-500 hover:bg-red-500/10 flex items-center gap-3"><i class="fas fa-sign-out-alt"></i> دەرچوون</button>
        </div>
    </div>

    <main class="container mx-auto px-4 py-6">

        <section id="auth-section" class="max-w-md mx-auto">
            <div class="bg-[#0d0d0d] p-8 rounded-[2.5rem] border border-white/5">
                <div class="flex bg-white/5 p-1 rounded-2xl mb-6">
                    <button onclick="authT(true)" id="b-login" class="flex-1 py-3 rounded-xl bg-green-500 font-bold">چوونەژوورەوە</button>
                    <button onclick="authT(false)" id="b-reg" class="flex-1 py-3 font-bold opacity-50">تۆمارکردن</button>
                </div>
                <form id="f-login" onsubmit="doLogin(event)" class="space-y-4">
                    <input type="email" id="l-email" placeholder="ئیمێڵ" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <input type="password" id="l-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <button class="w-full bg-green-500 p-4 rounded-2xl font-bold">چوونەژوورەوە</button>
                </form>
                <form id="f-reg" onsubmit="doReg(event)" class="space-y-4 hidden">
                    <div class="flex justify-center mb-4">
                        <label class="w-20 h-20 rounded-full bg-green-500/10 border-2 border-dashed border-green-500 flex items-center justify-center cursor-pointer overflow-hidden">
                            <img id="reg-preview" class="hidden w-full h-full object-cover">
                            <i id="reg-icon" class="fas fa-camera"></i>
                            <input type="file" onchange="previewImg(event, 'reg-preview', 'reg-icon')" class="hidden" id="r-img">
                        </label>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="r-f" placeholder="ناوی یەکەم" required class="p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                        <input type="text" id="r-l" placeholder="ناوی دووەم" required class="p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    </div>
                    <input type="text" id="r-u" placeholder="یوزەرنەیم (بێ دووبارە)" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <input type="email" id="r-e" placeholder="ئیمێڵ" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <input type="password" id="r-p" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <button class="w-full bg-green-500 p-4 rounded-2xl font-bold">دروستکردنی هەژمار</button>
                </form>
            </div>
        </section>

        <section id="workspace" class="hidden grid lg:grid-cols-2 gap-10">
            <div id="content-area" class="space-y-6">
                <div id="tab-projects" class="space-y-4">
                    <div class="bg-white/5 p-6 rounded-[2.5rem] border border-white/10">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="font-bold text-green-500">پڕۆژەکانم</h2>
                            <button onclick="addLink()" class="bg-green-500 px-4 py-2 rounded-xl text-xs">+ زیادکردن</button>
                        </div>
                        <div id="links-list" class="space-y-3"></div>
                    </div>
                </div>

                <div id="tab-profile" class="hidden bg-white/5 p-8 rounded-[2.5rem] border border-white/10 space-y-4 text-center">
                    <img id="prof-img" class="w-24 h-24 rounded-full mx-auto border-4 border-green-500 object-cover">
                    <h3 id="prof-name" class="text-xl font-bold"></h3>
                    <p id="prof-user" class="text-green-500 opacity-70"></p>
                    <div class="bg-black/40 p-4 rounded-2xl text-right space-y-2">
                        <p class="text-xs opacity-50">ئیمێڵ: <span id="prof-email" class="text-white"></span></p>
                        <p class="text-xs opacity-50">پاسۆرد: <span id="prof-pass" class="text-white"></span></p>
                    </div>
                </div>

                <div id="tab-designs" class="hidden grid grid-cols-3 gap-3 p-4 bg-white/5 rounded-[2.5rem] max-h-[500px] overflow-y-auto custom-scroll">
                    </div>
            </div>

            <div class="hidden lg:flex justify-center sticky top-24">
                <div id="phone-bg" class="phone-frame shadow-2xl p-6 flex flex-col items-center">
                    <div class="relative mt-8">
                        <img id="live-img" class="w-24 h-24 rounded-full border-2 border-white/20 object-cover">
                        <div id="live-badge" class="absolute bottom-0 right-0 w-6 h-6 rounded-full flex items-center justify-center text-[8px] hidden"></div>
                    </div>
                    <h2 id="live-name" class="mt-4 font-bold text-lg"></h2>
                    <div id="live-links" class="w-full mt-8 space-y-3 pb-10"></div>
                </div>
            </div>
        </section>

        <section id="admin-view" class="hidden space-y-6">
            <div class="bg-blue-600 p-8 rounded-[2.5rem] flex justify-between items-center">
                <h2 class="text-2xl font-bold">کۆنتڕۆڵی ئاریان</h2>
                <input type="text" oninput="searchUsers(this.value)" placeholder="سێرچ بۆ یوزەرنەیم..." class="p-3 rounded-xl bg-black/20 outline-none border border-white/10 text-sm">
            </div>
            <div id="admin-user-list" class="grid md:grid-cols-2 gap-4"></div>
        </section>
    </main>

    <script>
        let users = JSON.parse(localStorage.getItem('KA_V4_DB')) || {};
        let activeU = localStorage.getItem('KA_V4_SESS') || null;

        const colors = [
            '#050505', '#1a1a1a', '#001f3f', '#111111', '#1a0505', '#051a05',
            'linear-gradient(to bottom, #000428, #004e92)', 'linear-gradient(45deg, #0f0c29, #302b63, #24243e)',
            'linear-gradient(to right, #ed4264, #ffedbc)', 'linear-gradient(to right, #232526, #414345)',
            '#2d3436', '#636e72', '#2c3e50', '#000000', '#1e272e', '#485460'
            // زۆرتر لێرە زیاد دەکرێت بۆ گەیشتن بە ٥٠
        ];

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function toggleTheme() { document.body.classList.toggle('dark'); document.body.classList.toggle('light'); }
        function authT(isLogin) {
            document.getElementById('f-login').classList.toggle('hidden', !isLogin);
            document.getElementById('f-reg').classList.toggle('hidden', isLogin);
            document.getElementById('b-login').className = isLogin ? 'flex-1 py-3 rounded-xl bg-green-500 font-bold' : 'flex-1 py-3 font-bold opacity-50';
            document.getElementById('b-reg').className = !isLogin ? 'flex-1 py-3 rounded-xl bg-green-500 font-bold' : 'flex-1 py-3 font-bold opacity-50';
        }

        function previewImg(e, id, icon) {
            const r = new FileReader();
            r.onload = () => { 
                document.getElementById(id).src = r.result; 
                document.getElementById(id).classList.remove('hidden');
                document.getElementById(icon).classList.add('hidden');
            };
            r.readAsDataURL(e.target.files[0]);
        }

        function doReg(e) {
            e.preventDefault();
            const u = document.getElementById('r-u').value.toLowerCase().trim();
            if(users[u]) return alert("ئەم یوزەرنەیمە هەیە!");
            users[u] = {
                firstName: document.getElementById('r-f').value,
                lastName: document.getElementById('r-l').value,
                email: document.getElementById('r-e').value,
                pass: document.getElementById('r-p').value,
                img: document.getElementById('reg-preview').src || '',
                theme: colors[0],
                ver: null,
                links: []
            };
            activeU = u; save(); location.reload();
        }

        function doLogin(e) {
            e.preventDefault();
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            if(email === 'aryan@gmail.com' && pass === '12345678') {
                activeU = 'ADMIN'; save(); location.reload(); return;
            }
            const found = Object.keys(users).find(k => users[k].email === email && users[k].pass === pass);
            if(found) { activeU = found; save(); location.reload(); }
            else alert("هەڵەیە!");
        }

        function save() { localStorage.setItem('KA_V4_DB', JSON.stringify(users)); localStorage.setItem('KA_V4_SESS', activeU); }

        if(activeU) {
            document.getElementById('auth-section').classList.add('hidden');
            if(activeU === 'ADMIN') {
                document.getElementById('admin-view').classList.remove('hidden');
                document.getElementById('admin-indicator').classList.remove('hidden');
                renderAdmin();
            } else {
                document.getElementById('workspace').classList.remove('hidden');
                initUser();
            }
        }

        function initUser() {
            const u = users[activeU];
            document.getElementById('prof-name').innerText = u.firstName + " " + u.lastName;
            document.getElementById('prof-user').innerText = "@" + activeU;
            document.getElementById('prof-email').innerText = u.email;
            document.getElementById('prof-pass').innerText = u.pass;
            document.getElementById('prof-img').src = u.img || 'https://ui-avatars.com/api/?name=' + activeU;
            renderDesigns();
            renderLinks();
            updateLive();
        }

        function renderDesigns() {
            const area = document.getElementById('tab-designs');
            area.innerHTML = "";
            colors.forEach((c, index) => {
                const div = document.createElement('div');
                div.className = "h-24 rounded-2xl design-card border border-white/10";
                div.style.background = c;
                div.onclick = () => { users[activeU].theme = c; save(); updateLive(); };
                area.appendChild(div);
            });
        }

        function addLink() {
            users[activeU].links.push({ label: 'ئینستاگرام', url: '', type: 'instagram' });
            renderLinks();
        }

        function renderLinks() {
            const area = document.getElementById('links-list');
            area.innerHTML = "";
            users[activeU].links.forEach((l, i) => {
                area.innerHTML += `
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-2">
                    <input type="text" value="${l.label}" oninput="upL(${i},'label',this.value)" class="w-full bg-transparent border-b border-white/10 p-1 text-sm outline-none">
                    <input type="text" value="${l.url}" oninput="upL(${i},'url',this.value)" placeholder="لینک لێرە دابنێ" class="w-full bg-black/20 p-2 rounded-lg text-xs outline-none">
                    <button onclick="remL(${i})" class="text-red-500 text-[10px]">سڕینەوە</button>
                </div>`;
            });
            updateLive();
        }

        function upL(i,k,v) { users[activeU].links[i][k]=v; save(); updateLive(); }
        function remL(i) { users[activeU].links.splice(i,1); save(); renderLinks(); }

        function updateLive() {
            const u = users[activeU];
            const p = document.getElementById('phone-bg');
            p.style.background = u.theme;
            document.getElementById('live-img').src = u.img || 'https://ui-avatars.com/api/?name=' + activeU;
            document.getElementById('live-name').innerText = u.firstName + " " + u.lastName;
            const area = document.getElementById('live-links');
            area.innerHTML = "";
            u.links.forEach(l => {
                if(l.url) area.innerHTML += `<div class="w-full p-4 bg-white/10 backdrop-blur-md rounded-2xl text-center font-bold text-xs border border-white/20">${l.label}</div>`;
            });
            const b = document.getElementById('live-badge');
            if(u.ver) {
                b.className = `absolute bottom-0 right-0 w-6 h-6 rounded-full flex items-center justify-center text-[8px] ${u.ver === 'blue' ? 'bg-blue-500' : 'bg-yellow-500'}`;
                b.innerHTML = u.ver === 'blue' ? '<i class="fas fa-check"></i>' : '<i class="fas fa-star"></i>';
                b.classList.remove('hidden');
            } else b.classList.add('hidden');
        }

        function renderAdmin() {
            const area = document.getElementById('admin-user-list');
            area.innerHTML = "";
            Object.keys(users).forEach(k => {
                const u = users[k];
                area.innerHTML += `
                <div class="bg-white/5 p-4 rounded-3xl border border-white/10 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="${u.img}" class="w-10 h-10 rounded-full">
                        <div><p class="font-bold text-sm">@${k}</p><p class="text-[10px] opacity-50">${u.firstName} ${u.lastName}</p></div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="adminVer('${k}','blue')" class="w-7 h-7 bg-blue-500 rounded-full text-[8px]"><i class="fas fa-check"></i></button>
                        <button onclick="adminVer('${k}','yellow')" class="w-7 h-7 bg-yellow-500 rounded-full text-[8px]"><i class="fas fa-star"></i></button>
                        <button onclick="adminDel('${k}')" class="w-7 h-7 bg-red-600 rounded-full text-[8px]"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
        }
        function adminVer(u,v) { users[u].ver=v; save(); renderAdmin(); }
        function adminDel(u) { if(confirm('بسڕێتەوە؟')) { delete users[u]; save(); renderAdmin(); } }

        function switchTab(t) {
            ['projects', 'profile', 'designs'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            toggleMenu();
        }

        function logout() { localStorage.removeItem('KA_V4_SESS'); location.reload(); }
    </script>
</body>
</html>
