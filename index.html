<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurdAgencyLink | پڕۆژەکان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; transition: 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark { background-color: #050505; color: white; }
        .light { background-color: #f8fafc; color: #1e293b; }
        
        .btn-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888) !important; color: white !important; }
        .btn-facebook { background: #1877F2 !important; color: white !important; }
        .btn-tiktok { background: #000000 !important; color: white !important; border: 1px solid #ff0050 !important; }
        .btn-snapchat { background: #FFFC00 !important; color: black !important; }
        .btn-whatsapp { background: #25D366 !important; color: white !important; }
        .btn-link { background: #6366f1 !important; color: white !important; }

        .theme-classic { background: #0a0a0a !important; color: white !important; }
        .theme-modern { background: linear-gradient(135deg, #0f172a, #1e293b) !important; color: #38bdf8 !important; }
        .theme-neon { background: #000 !important; color: #39ff14 !important; text-shadow: 0 0 8px #39ff14; }
        .theme-royal { background: #1a1c2c !important; color: #fbbf24 !important; }
    </style>
</head>
<body class="dark min-h-screen">

    <nav class="p-4 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#050505]/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-green-500 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg shadow-green-500/20">K</div>
            <span class="text-xl font-bold italic tracking-tight">KurdAgency<span class="text-green-500">Link</span></span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-white/5 hover:bg-white/10 transition-all"><i class="fas fa-adjust"></i></button>
            <button id="logout-btn" onclick="logout()" class="hidden px-4 py-2 bg-red-500/20 text-red-500 rounded-xl text-xs font-bold border border-red-500/10">دەرچوون</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <section id="auth-section" class="max-w-md mx-auto mt-10">
            <div class="bg-[#0d0d0d] p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                <div class="flex bg-white/5 p-1 rounded-2xl mb-8">
                    <button onclick="showAuth('login')" id="tab-login" class="flex-1 py-3 rounded-xl font-bold bg-green-500">چوونەژوورەوە</button>
                    <button onclick="showAuth('reg')" id="tab-reg" class="flex-1 py-3 rounded-xl font-bold opacity-50">تۆمارکردن</button>
                </div>
                <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="text" id="l-user" placeholder="ئیمێڵ یان یوزەرنەیم" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <input type="password" id="l-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <button class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold shadow-lg">چوونەژوورەوە</button>
                </form>
                <form id="reg-form" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                    <input type="text" id="r-name" placeholder="ناوی تەواو" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <input type="text" id="r-user" placeholder="یوزەرنەیم (بە ئینگلیزی)" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <input type="password" id="r-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <button class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold">تۆمارکردنی هەژمار</button>
                </form>
            </div>
        </section>

        <section id="admin-panel" class="hidden max-w-5xl mx-auto space-y-6">
            <div class="bg-blue-600 p-8 rounded-[2.5rem] flex justify-between items-center shadow-xl">
                <div><h2 class="text-2xl font-bold italic">کۆنتڕۆڵی ئاریان</h2><p class="text-sm opacity-80">بەڕێوەبەری سەرەکی پڕۆژە</p></div>
                <i class="fas fa-shield-alt text-5xl opacity-20"></i>
            </div>
            <div class="bg-white/5 p-6 rounded-[2.5rem] border border-white/10">
                <input type="text" id="adm-search" oninput="searchAdmin()" placeholder="گەڕان بۆ هەژمارەکان (یوزەرنەیم یان ناو)..." class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none mb-6">
                <div id="admin-list" class="grid gap-4"></div>
            </div>
        </section>

        <section id="user-panel" class="hidden grid lg:grid-cols-2 gap-10 max-w-6xl mx-auto">
            <div class="space-y-6">
                
                <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/10 bg-gradient-to-br from-white/5 to-transparent">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-bold text-green-500 italic flex items-center gap-2"><i class="fas fa-layer-group"></i> پڕۆژەکانم</h2>
                        <button onclick="addLink()" class="bg-green-500 text-white px-5 py-2 rounded-xl text-xs font-bold hover:scale-105 transition-all shadow-lg shadow-green-500/20">+ زیادکردنی لینک</button>
                    </div>
                    <div id="links-editor" class="space-y-4">
                        </div>
                    <div id="no-links-msg" class="text-center py-10 opacity-30 text-sm hidden italic">تا ئێستا هیچ پڕۆژەیەکت نییە، یەکەم لینک زیاد بکە!</div>
                </div>

                <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/10">
                    <h2 class="text-xl font-bold text-green-500 mb-6 flex items-center gap-2"><i class="fas fa-user-edit text-sm"></i> زانیاری پڕۆفایل</h2>
                    <div class="flex items-center gap-6 mb-6">
                        <input type="file" id="u-img-in" onchange="upImg(event)" class="hidden">
                        <label for="u-img-in" class="w-24 h-24 bg-green-500/10 rounded-full border-2 border-dashed border-green-500 flex items-center justify-center cursor-pointer overflow-hidden shadow-inner">
                            <img id="u-img-view" src="" class="hidden w-full h-full object-cover">
                            <i id="u-cam" class="fas fa-camera text-green-500 text-2xl"></i>
                        </label>
                        <div class="flex-1 space-y-3">
                            <input type="text" id="u-name" oninput="live()" placeholder="ناوەکەت" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-green-500 transition-all">
                            <textarea id="u-bio" oninput="live()" placeholder="بایۆ یان وەسفی کورت" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 outline-none h-16 resize-none focus:border-green-500 transition-all"></textarea>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <select id="u-theme" onchange="live()" class="p-3 rounded-xl bg-[#151515] border border-white/10 outline-none text-xs">
                            <option value="theme-classic">دیزاینی کلاسیک</option>
                            <option value="theme-modern">دیزاینی مۆدێرن</option>
                            <option value="theme-neon">دیزاینی نێۆن</option>
                            <option value="theme-royal">دیزاینی شاهانە</option>
                        </select>
                        <div class="flex items-center gap-2 bg-white/5 px-3 rounded-xl border border-white/10">
                            <i class="fas fa-expand text-[10px] opacity-50"></i>
                            <input type="range" id="u-size" min="60" max="150" value="100" oninput="live()" class="w-full accent-green-500 cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white relative overflow-hidden shadow-2xl">
                    <h3 class="text-xl font-bold italic">نیشانەی فەرمی و سەح</h3>
                    <p class="text-xs opacity-80 mt-2">بۆ وەرگرتنی سەحی شین ١,٥٠٠ دینار بنێرە:</p>
                    <div class="mt-4 p-4 bg-white/10 rounded-2xl border border-white/20">
                        <p class="font-mono font-bold text-xl tracking-widest">07729585559</p>
                        <p class="text-[10px] mt-1 font-bold">FIB یان FASTPAY</p>
                    </div>
                    <a href="https://wa.me/9647729585559?text=سڵاو، ١٥٠٠ دینارم نارد بۆ سەح، ئەمەش وێنەی پسوڵەکەیە بۆ یوزەری: " id="wa-link" target="_blank" class="block w-full text-center bg-white text-indigo-600 p-3 rounded-xl mt-4 font-bold text-xs hover:bg-gray-100 transition-all shadow-lg">ناردنی سکرین (WhatsApp)</a>
                </div>

                <button onclick="genLink()" class="w-full bg-green-500 text-white p-6 rounded-[2.5rem] font-bold text-lg shadow-xl shadow-green-500/20 active:scale-95 transition-all">بڵاوکردنەوەی پڕۆژەکە</button>
                <div id="copy-box" class="hidden mt-4 p-5 bg-white/5 rounded-[2.5rem] border-2 border-dashed border-green-500 flex justify-between items-center animate-pulse">
                    <span id="final-url" class="text-xs font-bold text-green-500 truncate mr-4"></span>
                    <button onclick="copyIt()" class="bg-green-500 px-6 py-2 rounded-xl text-[10px] font-bold shrink-0">کۆپی</button>
                </div>
            </div>

            <div class="hidden lg:flex justify-center sticky top-28 h-fit">
                <div class="w-[310px] h-[620px] bg-black rounded-[3.5rem] border-[10px] border-[#1a1a1a] shadow-2xl relative overflow-hidden">
                    <div id="pre-screen" class="w-full h-full p-8 flex flex-col items-center overflow-y-auto">
                        <div class="mt-10 relative">
                            <img id="pre-img" src="https://ui-avatars.com/api/?name=User" class="rounded-full shadow-2xl object-cover">
                            <div id="pre-badge" class="hidden absolute -bottom-1 -right-1 w-7 h-7 rounded-full flex items-center justify-center border-2 border-black text-[10px] shadow-lg"></div>
                        </div>
                        <h2 id="pre-name" class="font-bold text-lg mt-5 text-center">ناوەکەت</h2>
                        <p id="pre-bio" class="text-[10px] opacity-60 text-center mt-2 px-2"></p>
                        <div id="pre-links" class="w-full mt-10 space-y-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="public-view" class="hidden max-w-md mx-auto py-12 flex flex-col items-center min-h-screen">
            <div class="relative">
                <img id="v-img" src="" class="rounded-full shadow-2xl border-4 border-white/10 object-cover">
                <div id="v-badge" class="hidden absolute bottom-2 right-2 w-8 h-8 rounded-full flex items-center justify-center border-4 border-black shadow-xl"></div>
            </div>
            <h1 id="v-name" class="mt-6 text-2xl font-bold"></h1>
            <p id="v-bio" class="text-sm opacity-60 text-center mt-4 px-10 leading-relaxed"></p>
            <div id="v-links" class="w-full mt-10 space-y-4 px-6"></div>
        </section>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('KAL_PRO_V3')) || {};
        let activeUser = localStorage.getItem('KAL_SESSION_V3') || null;

        const platforms = {
            instagram: { name: 'ئینستاگرام', icon: 'fab fa-instagram', cls: 'btn-instagram' },
            facebook: { name: 'فەیسبووک', icon: 'fab fa-facebook', cls: 'btn-facebook' },
            tiktok: { name: 'تیکتۆک', icon: 'fab fa-tiktok', cls: 'btn-tiktok' },
            snapchat: { name: 'سناپچات', icon: 'fab fa-snapchat', cls: 'btn-snapchat' },
            whatsapp: { name: 'واتسئەپ', icon: 'fab fa-whatsapp', cls: 'btn-whatsapp' },
            web: { name: 'ماڵپەڕ', icon: 'fas fa-globe', cls: 'btn-link' }
        };

        const bgs = {
            blue: { icon: 'fas fa-check', cls: 'bg-blue-500 text-white' },
            gold: { icon: 'fas fa-crown', cls: 'bg-yellow-500 text-white' },
            red: { icon: 'fas fa-fire', cls: 'bg-red-500 text-white' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const viewUser = urlParams.get('u');

        if (viewUser && db[viewUser]) renderPublic(viewUser);
        else if (activeUser === 'aryan@gmail.com') showAdmin();
        else if (activeUser && db[activeUser]) showDashboard();

        function save() { 
            localStorage.setItem('KAL_PRO_V3', JSON.stringify(db)); 
            if(activeUser) localStorage.setItem('KAL_SESSION_V3', activeUser);
        }

        function toggleTheme() { document.body.classList.toggle('dark'); document.body.classList.toggle('light'); }

        function showAuth(t) {
            document.getElementById('login-form').classList.toggle('hidden', t==='reg');
            document.getElementById('reg-form').classList.toggle('hidden', t==='login');
            document.getElementById('tab-login').className = t==='login' ? 'flex-1 py-3 rounded-xl font-bold bg-green-500' : 'flex-1 opacity-50 font-bold text-sm';
            document.getElementById('tab-reg').className = t==='reg' ? 'flex-1 py-3 rounded-xl font-bold bg-green-500' : 'flex-1 opacity-50 font-bold text-sm';
        }

        function handleRegister(e) {
            e.preventDefault();
            const user = document.getElementById('r-user').value.toLowerCase().trim();
            if(db[user] || user === 'aryan@gmail.com') return alert("ئەم یوزەرە گیراوە!");
            db[user] = { 
                name: document.getElementById('r-name').value, 
                pass: document.getElementById('r-pass').value, 
                bio: "بەخێربێیت بۆ لاپەڕەکەم", img: "", imgSize: 100, theme: 'theme-classic', ver: null, links: [] 
            };
            activeUser = user; save(); showDashboard();
        }

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('l-user').value.toLowerCase().trim();
            const p = document.getElementById('l-pass').value;
            if(u === 'aryan@gmail.com' && p === '12345678') { activeUser = u; save(); showAdmin(); return; }
            if(db[u] && db[u].pass === p) { activeUser = u; save(); showDashboard(); } 
            else alert("زانیارییەکان هەڵەن!");
        }

        function showAdmin() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            renderAdmin();
        }

        function renderAdmin() {
            const list = document.getElementById('admin-list'); list.innerHTML = "";
            Object.keys(db).forEach(id => {
                const user = db[id];
                list.innerHTML += `
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-3xl border border-white/10 hover:bg-white/10 transition-all">
                    <div class="flex items-center gap-3">
                        <img src="${user.img || 'https://ui-avatars.com/api/?name='+id}" class="w-12 h-12 rounded-full object-cover border border-white/10">
                        <div><p class="font-bold text-sm">@${id}</p><p class="text-[10px] opacity-50">ناو: ${user.name} | پڕۆژە: ${user.links.length}</p></div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="setV('${id}', 'blue')" class="w-7 h-7 bg-blue-500 rounded-full text-[8px]"><i class="fas fa-check"></i></button>
                        <button onclick="setV('${id}', 'gold')" class="w-7 h-7 bg-yellow-500 rounded-full text-[8px]"><i class="fas fa-crown"></i></button>
                        <button onclick="setV('${id}', null)" class="w-7 h-7 bg-gray-500 rounded-full text-[8px]"><i class="fas fa-times"></i></button>
                        <button onclick="delU('${id}')" class="w-7 h-7 bg-red-900 rounded-full text-[8px] ml-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
        }
        function setV(i, v) { db[i].ver = v; save(); renderAdmin(); }
        function delU(i) { if(confirm('بسڕێتەوە؟')) { delete db[i]; save(); renderAdmin(); } }
        function searchAdmin() {
            const q = document.getElementById('adm-search').value.toLowerCase();
            Array.from(document.getElementById('admin-list').children).forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
        }

        function showDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('user-panel').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            const user = db[activeUser];
            document.getElementById('u-name').value = user.name;
            document.getElementById('u-bio').value = user.bio;
            document.getElementById('u-theme').value = user.theme;
            document.getElementById('u-size').value = user.imgSize;
            document.getElementById('wa-link').href += activeUser;
            if(user.img) { document.getElementById('u-img-view').src = user.img; document.getElementById('u-img-view').classList.remove('hidden'); document.getElementById('u-cam').classList.add('hidden'); }
            renderEditLinks(); live();
        }

        function upImg(e) { const r = new FileReader(); r.onload = () => { db[activeUser].img = r.result; showDashboard(); }; r.readAsDataURL(e.target.files[0]); }
        
        function addLink() { 
            db[activeUser].links.unshift({ type: 'instagram', url: '', label: 'ئینستاگرام' }); 
            save(); renderEditLinks(); live(); 
        }

        function renderEditLinks() {
            const area = document.getElementById('links-editor'); 
            const msg = document.getElementById('no-links-msg');
            area.innerHTML = "";
            if(db[activeUser].links.length === 0) msg.classList.remove('hidden');
            else msg.classList.add('hidden');

            db[activeUser].links.forEach((l, i) => {
                area.innerHTML += `
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-3 hover:border-green-500/30 transition-all">
                    <div class="flex gap-2 items-center">
                        <select onchange="upL(${i}, 'type', this.value)" class="bg-black text-[10px] p-2 rounded-lg outline-none border border-white/10">
                            ${Object.keys(platforms).map(p => `<option value="${p}" ${l.type===p?'selected':''}>${platforms[p].name}</option>`).join('')}
                        </select>
                        <input type="text" value="${l.label}" oninput="upL(${i}, 'label', this.value)" placeholder="ناوەکەی" class="flex-1 bg-transparent border-b border-white/10 text-xs outline-none py-1 focus:border-green-500">
                        <button onclick="remL(${i})" class="w-8 h-8 flex items-center justify-center text-red-500/50 hover:text-red-500 transition-all"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <input type="text" value="${l.url}" oninput="upL(${i}, 'url', this.value)" placeholder="لینکەکە لێرە دابنێ..." class="w-full bg-white/5 p-2 rounded-lg text-[10px] outline-none border border-transparent focus:border-white/10">
                </div>`;
            });
        }
        function upL(i, k, v) { db[activeUser].links[i][k] = v; if(k==='type') db[activeUser].links[i].label = platforms[v].name; save(); live(); }
        function remL(i) { if(confirm('ئەم پڕۆژەیە لابدریت؟')) { db[activeUser].links.splice(i, 1); save(); renderEditLinks(); live(); } }

        function live() {
            const user = db[activeUser];
            user.name = document.getElementById('u-name').value;
            user.bio = document.getElementById('u-bio').value;
            user.theme = document.getElementById('u-theme').value;
            user.imgSize = document.getElementById('u-size').value;
            save();

            const pre = document.getElementById('pre-screen'); pre.className = `w-full h-full p-8 flex flex-col items-center overflow-y-auto ${user.theme}`;
            document.getElementById('pre-name').innerText = user.name || "ناوەکەت";
            document.getElementById('pre-bio').innerText = user.bio || "بایۆکەت لێرە دەردەکەوێت";
            const bdg = document.getElementById('pre-badge');
            if(user.ver) { bdg.className = `absolute -bottom-1 -right-1 w-7 h-7 rounded-full flex items-center justify-center border-2 border-black text-[10px] ${bgs[user.ver].cls}`; bdg.innerHTML = `<i class="${bgs[user.ver].icon}"></i>`; bdg.classList.remove('hidden'); }
            else bdg.classList.add('hidden');

            const img = document.getElementById('pre-img');
            img.src = user.img || `https://ui-avatars.com/api/?name=${user.name || 'U'}`;
            img.style.width = user.imgSize + "px"; img.style.height = user.imgSize + "px";

            const area = document.getElementById('pre-links'); area.innerHTML = "";
            user.links.forEach(l => { if(l.url) area.innerHTML += `<div class="w-full p-4 rounded-2xl flex items-center justify-center gap-3 font-bold text-xs shadow-lg ${platforms[l.type].cls}"><i class="${platforms[l.type].icon}"></i> ${l.label}</div>`; });
        }

        function genLink() { const f = window.location.origin + window.location.pathname + "?u=" + activeUser; document.getElementById('final-url').innerText = f; document.getElementById('copy-box').classList.remove('hidden'); }
        function copyIt() { navigator.clipboard.writeText(document.getElementById('final-url').innerText); alert("کۆپی کرا!"); }

        function renderPublic(username) {
            const user = db[username]; document.body.className = user.theme + " min-h-screen";
            document.getElementById('auth-section').remove(); document.querySelector('nav').remove();
            document.getElementById('public-view').classList.remove('hidden');
            const img = document.getElementById('v-img'); img.src = user.img || `https://ui-avatars.com/api/?name=${user.name}`;
            img.style.width = user.imgSize + "px"; img.style.height = user.imgSize + "px";
            document.getElementById('v-name').innerText = user.name;
            document.getElementById('v-bio').innerText = user.bio;
            const bdg = document.getElementById('v-badge');
            if(user.ver) { bdg.className = `absolute bottom-2 right-2 w-8 h-8 rounded-full flex items-center justify-center border-4 border-black ${bgs[user.ver].cls}`; bdg.innerHTML = `<i class="${bgs[user.ver].icon}"></i>`; bdg.classList.remove('hidden'); }
            const area = document.getElementById('v-links');
            user.links.forEach(l => { if(l.url) area.innerHTML += `<a href="${l.url}" target="_blank" class="flex items-center justify-center gap-4 w-full p-5 rounded-[2.5rem] font-bold shadow-xl transition-all hover:scale-[1.03] ${platforms[l.type].cls}"><i class="${platforms[l.type].icon} text-2xl"></i><span class="text-lg">${l.label}</span></a>`; });
        }

        function logout() { localStorage.removeItem('KAL_SESSION_V3'); location.href = location.origin + location.pathname; }
    </script>
</body>
</html>
