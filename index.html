<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurdAgency - Bio Link System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .side-menu { position: fixed; top: 0; right: 0; height: 100%; width: 280px; background: #111; z-index: 1000; transition: 0.4s ease; transform: translateX(100%); border-l: 1px solid #222; }
        .side-menu.active { transform: translateX(0); }
        .phone-frame { width: 320px; height: 600px; border: 10px solid #1a1a1a; border-radius: 2.5rem; background: #fff; overflow-y: auto; position: sticky; top: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .design-card { cursor: pointer; border: 2px solid transparent; transition: 0.2s; border-radius: 1rem; overflow: hidden; height: 120px; position: relative; }
        .design-card:hover { border-color: #22c55e; }
        .link-btn { transition: 0.2s; cursor: pointer; }
        .link-btn:active { transform: scale(0.95); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-white/10 flex justify-between items-center bg-black/80 backdrop-blur-md sticky top-0 z-[500]">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="text-2xl text-green-500"><i class="fas fa-bars"></i></button>
            <h1 class="text-xl font-bold">KurdAgency</h1>
        </div>
        <div id="admin-badge" class="hidden px-3 py-1 bg-blue-600 rounded-full text-[10px] font-bold">بەڕێوەبەر (ئاریان)</div>
    </nav>

    <div id="side-menu" class="side-menu p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <span class="font-bold text-lg text-green-500">مینیوی سەرەکی</span>
            <button onclick="toggleMenu()" class="text-red-500 text-xl"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex flex-col gap-3">
            <button onclick="showSection('projects')" class="w-full text-right p-4 rounded-xl bg-white/5 hover:bg-green-500/20 flex items-center gap-3"><i class="fas fa-link"></i> پڕۆژەکانم</button>
            <button onclick="showSection('designs')" class="w-full text-right p-4 rounded-xl bg-white/5 hover:bg-green-500/20 flex items-center gap-3"><i class="fas fa-palette"></i> دیزاینەکان</button>
            <button onclick="showSection('profile')" class="w-full text-right p-4 rounded-xl bg-white/5 hover:bg-green-500/20 flex items-center gap-3"><i class="fas fa-user-circle"></i> پڕۆفایل</button>
            <div class="h-[1px] bg-white/10 my-2"></div>
            <button onclick="logout()" class="w-full text-right p-4 rounded-xl text-red-500 hover:bg-red-500/10 flex items-center gap-3"><i class="fas fa-sign-out-alt"></i> دەرچوون</button>
        </div>
    </div>

    <main class="container mx-auto p-4">

        <section id="auth-screen" class="max-w-md mx-auto mt-10">
            <div class="bg-[#111] p-8 rounded-[2rem] border border-white/10">
                <div class="flex bg-black p-1 rounded-xl mb-6">
                    <button onclick="toggleAuth(true)" id="tab-login" class="flex-1 py-3 rounded-lg bg-green-500 font-bold">چوونەژوورەوە</button>
                    <button onclick="toggleAuth(false)" id="tab-reg" class="flex-1 py-3 rounded-lg font-bold opacity-50">تۆمارکردن</button>
                </div>

                <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" id="login-email" placeholder="ئیمێڵ" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-green-500">
                    <input type="password" id="login-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-green-500">
                    <button class="w-full bg-green-500 p-4 rounded-xl font-bold shadow-lg shadow-green-500/20">چوونەژوورەوە</button>
                </form>

                <form id="reg-form" onsubmit="handleReg(event)" class="space-y-4 hidden">
                    <div class="flex justify-center mb-4">
                        <label class="w-24 h-24 rounded-full bg-white/5 border-2 border-dashed border-green-500 flex items-center justify-center cursor-pointer overflow-hidden">
                            <img id="reg-preview" class="hidden w-full h-full object-cover">
                            <i id="reg-icon" class="fas fa-camera text-2xl opacity-30"></i>
                            <input type="file" onchange="uploadImg(event, 'reg-preview', 'reg-icon')" class="hidden" id="reg-file">
                        </label>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="reg-f" placeholder="ناوی یەکەم" required class="p-4 rounded-xl bg-white/5 border border-white/10 outline-none">
                        <input type="text" id="reg-l" placeholder="ناوی دووەم" required class="p-4 rounded-xl bg-white/5 border border-white/10 outline-none">
                    </div>
                    <input type="text" id="reg-user" placeholder="یوزەرنەیم (تەنیا ئینگلیزی)" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none">
                    <input type="email" id="reg-email" placeholder="ئیمێڵ" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none">
                    <input type="password" id="reg-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none">
                    <button class="w-full bg-green-500 p-4 rounded-xl font-bold">دروستکردنی هەژمار</button>
                </form>
            </div>
        </section>

        <section id="app-screen" class="hidden grid lg:grid-cols-2 gap-10 items-start">
            
            <div class="space-y-6">
                <div id="section-projects" class="space-y-4">
                    <div class="bg-[#111] p-6 rounded-[2rem] border border-white/10">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold">پڕۆژەکانم</h2>
                            <button onclick="createNewLink()" class="bg-green-500 px-6 py-2 rounded-lg text-xs font-bold">+ زیادکردن</button>
                        </div>
                        <div id="links-list" class="space-y-4 max-h-[400px] overflow-y-auto custom-scroll pr-2"></div>
                    </div>

                    <div class="bg-gradient-to-r from-blue-600/20 to-purple-600/20 border border-blue-500/30 p-6 rounded-[2rem]">
                        <h3 class="text-lg font-bold text-blue-400 italic">بەدەستهێنانی سەحی شین</h3>
                        <p class="text-xs mt-1 opacity-70">بڕی ١,٥٠٠ دینار بنێرە و وێنەی پسوڵەمان بۆ بنێرە.</p>
                        <div class="mt-4 flex gap-2">
                            <div class="flex-1 bg-black/40 p-3 rounded-xl text-center font-mono border border-white/5">07729585559</div>
                            <a id="whatsapp-link" href="#" target="_blank" class="bg-green-600 px-4 flex items-center rounded-xl"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>
                </div>

                <div id="section-profile" class="hidden bg-[#111] p-8 rounded-[2rem] border border-white/10 text-center space-y-6">
                    <img id="p-avatar" class="w-24 h-24 rounded-full mx-auto border-4 border-green-500 object-cover bg-black">
                    <div>
                        <h2 id="p-name" class="text-2xl font-bold"></h2>
                        <p id="p-username" class="text-green-500"></p>
                    </div>
                    <div class="text-right space-y-4 bg-black/30 p-6 rounded-2xl border border-white/5">
                        <div>
                            <label class="text-[10px] opacity-40 block mb-1">ئیمێڵی هەژمار</label>
                            <div id="p-email" class="font-bold"></div>
                        </div>
                        <div>
                            <label class="text-[10px] opacity-40 block mb-1">پاسۆردی هەژمار</label>
                            <div id="p-pass" class="font-bold"></div>
                        </div>
                    </div>
                </div>

                <div id="section-designs" class="hidden space-y-4">
                    <h2 class="text-xl font-bold px-2">شێوازی لاپەڕە (٥٠ جۆر)</h2>
                    <div id="designs-grid" class="grid grid-cols-2 gap-4 max-h-[500px] overflow-y-auto custom-scroll p-2"></div>
                </div>
            </div>

            <div class="hidden lg:flex justify-center">
                <div id="preview-frame" class="phone-frame p-6 flex flex-col items-center">
                    <div class="relative mt-8">
                        <img id="m-avatar" class="w-24 h-24 rounded-full border-4 border-white/20 object-cover bg-gray-200">
                        <div id="m-verified" class="absolute bottom-1 right-1 w-7 h-7 rounded-full flex items-center justify-center border-4 border-white hidden"></div>
                    </div>
                    <h2 id="m-name" class="mt-4 font-bold text-lg text-gray-800"></h2>
                    <div id="m-links" class="w-full mt-10 space-y-4 pb-10"></div>
                    <div class="mt-auto py-4 text-[10px] text-gray-400 font-bold italic">KurdAgency Pro</div>
                </div>
            </div>

        </section>

        <section id="admin-screen" class="hidden space-y-6">
            <div class="bg-indigo-600/30 p-8 rounded-[2rem] border border-indigo-500/30 flex flex-col md:flex-row justify-between items-center gap-6">
                <h2 class="text-2xl font-bold italic text-indigo-400">بەڕێوەبردنی بەکارهێنەران</h2>
                <div class="relative w-full md:w-80">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 opacity-40"></i>
                    <input type="text" oninput="adminSearch(this.value)" placeholder="بگەڕێ بۆ یوزەرنەیم..." class="w-full p-4 pl-12 rounded-2xl bg-black/50 border border-white/10 outline-none focus:border-indigo-500">
                </div>
            </div>
            <div id="admin-users-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

    </main>

    <script>
        // Database
        let db = JSON.parse(localStorage.getItem('KA_BIO_DB')) || {};
        let activeUser = localStorage.getItem('KA_BIO_SESS') || null;

        // Colors/Designs
        const designList = [
            { id: 1, bg: '#ffffff', txt: '#111', lBg: '#f3f3f1', lTxt: '#111', name: 'کلاسیک سپی' },
            { id: 2, bg: '#000000', txt: '#fff', lBg: '#222', lTxt: '#fff', name: 'تاریکی ڕەها' },
            { id: 3, bg: 'linear-gradient(to bottom, #1e3c72, #2a5298)', txt: '#fff', lBg: 'rgba(255,255,255,0.1)', lTxt: '#fff', name: 'شینی شاهانە' },
            { id: 4, bg: 'linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%)', txt: '#d63384', lBg: '#fff', lTxt: '#d63384', name: 'گوڵاڵی' },
            { id: 5, bg: '#004d40', txt: '#fff', lBg: '#00695c', lTxt: '#fff', name: 'سەوزی تاریک' },
            { id: 6, bg: '#2c3e50', txt: '#fff', lBg: '#34495e', lTxt: '#fff', name: 'خۆڵەمێشی' },
            { id: 7, bg: 'linear-gradient(to right, #8e2de2, #4a00e0)', txt: '#fff', lBg: 'rgba(255,255,255,0.2)', lTxt: '#fff', name: 'مۆری جادوویی' },
            { id: 8, bg: '#121212', txt: '#00ff00', lBg: '#000', lTxt: '#00ff00', name: 'ماتریکس' }
        ];
        // Generate up to 50 dynamically
        for(let i=9; i<=50; i++) {
            designList.push({ id: i, bg: `hsl(${i*7}, 30%, 20%)`, txt: '#fff', lBg: 'rgba(255,255,255,0.1)', lTxt: '#fff', name: `دیزاینی ${i}` });
        }

        // Functions
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        
        function toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('reg-form').classList.toggle('hidden', isLogin);
            document.getElementById('tab-login').className = isLogin ? 'flex-1 py-3 rounded-lg bg-green-500 font-bold' : 'flex-1 py-3 rounded-lg font-bold opacity-50';
            document.getElementById('tab-reg').className = !isLogin ? 'flex-1 py-3 rounded-lg bg-green-500 font-bold' : 'flex-1 py-3 rounded-lg font-bold opacity-50';
        }

        function uploadImg(e, prevId, iconId) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById(prevId).src = reader.result;
                document.getElementById(prevId).classList.remove('hidden');
                document.getElementById(iconId).classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function handleReg(e) {
            e.preventDefault();
            const u = document.getElementById('reg-user').value.toLowerCase().trim();
            if(db[u]) return alert("ئەم یوزەرنەیمە گیراوە!");
            
            db[u] = {
                f: document.getElementById('reg-f').value,
                l: document.getElementById('reg-l').value,
                e: document.getElementById('reg-email').value,
                p: document.getElementById('reg-pass').value,
                img: document.getElementById('reg-preview').src || '',
                theme: designList[0],
                ver: null,
                links: []
            };
            activeUser = u; save(); location.reload();
        }

        function handleLogin(e) {
            e.preventDefault();
            const em = document.getElementById('login-email').value;
            const ps = document.getElementById('login-pass').value;
            
            if(em === 'aryan@gmail.com' && ps === '12345678') {
                activeUser = 'ADMIN'; save(); location.reload(); return;
            }
            
            const user = Object.keys(db).find(k => db[k].e === em && db[k].p === ps);
            if(user) { activeUser = user; save(); location.reload(); }
            else alert("زانیارییەکان هەڵەن!");
        }

        function save() { 
            localStorage.setItem('KA_BIO_DB', JSON.stringify(db)); 
            localStorage.setItem('KA_BIO_SESS', activeUser); 
        }

        // App Logic
        if(activeUser) {
            document.getElementById('auth-screen').classList.add('hidden');
            if(activeUser === 'ADMIN') {
                document.getElementById('admin-screen').classList.remove('hidden');
                document.getElementById('admin-badge').classList.remove('hidden');
                renderAdmin();
            } else {
                document.getElementById('app-screen').classList.remove('hidden');
                initUser();
            }
        }

        function initUser() {
            const u = db[activeUser];
            document.getElementById('p-name').innerText = u.f + " " + u.l;
            document.getElementById('p-username').innerText = "@" + activeUser;
            document.getElementById('p-email').innerText = u.e;
            document.getElementById('p-pass').innerText = u.p;
            document.getElementById('p-avatar').src = u.img || '';
            document.getElementById('whatsapp-link').href = "https://wa.me/9647729585559?text=سکرین-پسوڵە: " + activeUser;
            renderLinks();
            renderDesigns();
            updateLive();
        }

        function createNewLink() {
            db[activeUser].links.unshift({ title: 'ناونیشانی لینک', url: '' });
            save(); renderLinks();
        }

        function renderLinks() {
            const box = document.getElementById('links-list');
            box.innerHTML = "";
            db[activeUser].links.forEach((l, i) => {
                box.innerHTML += `
                <div class="bg-white/5 p-4 rounded-xl border border-white/5 space-y-3 group">
                    <div class="flex justify-between items-center">
                        <input type="text" value="${l.title}" oninput="updateLink(${i},'title',this.value)" class="bg-transparent border-b border-white/10 outline-none text-sm font-bold w-full focus:border-green-500">
                        <button onclick="removeLink(${i})" class="text-red-500 opacity-0 group-hover:opacity-100 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <input type="text" value="${l.url}" oninput="updateLink(${i},'url',this.value)" placeholder="https://..." class="w-full bg-black/50 p-2.5 rounded-lg text-xs outline-none border border-transparent focus:border-blue-500">
                </div>`;
            });
            updateLive();
        }

        function updateLink(i, k, v) { db[activeUser].links[i][k] = v; save(); updateLive(); }
        function removeLink(i) { db[activeUser].links.splice(i, 1); save(); renderLinks(); }

        function renderDesigns() {
            const grid = document.getElementById('designs-grid');
            grid.innerHTML = "";
            designList.forEach(d => {
                grid.innerHTML += `
                <div onclick="applyDesign(${d.id})" class="design-card p-3 shadow-inner" style="background: ${d.bg}">
                    <div class="h-4 w-full rounded-full mb-2 opacity-30" style="background: ${d.lBg}"></div>
                    <div class="h-4 w-full rounded-full opacity-30" style="background: ${d.lBg}"></div>
                    <span class="absolute bottom-2 left-2 text-[8px] font-bold" style="color: ${d.txt}">${d.name}</span>
                </div>`;
            });
        }

        function applyDesign(id) {
            db[activeUser].theme = designList.find(x => x.id === id);
            save(); updateLive();
        }

        function updateLive() {
            const u = db[activeUser];
            const frame = document.getElementById('preview-frame');
            const name = document.getElementById('m-name');
            const lBox = document.getElementById('m-links');
            
            frame.style.background = u.theme.bg;
            name.innerText = u.f + " " + u.l;
            name.style.color = u.theme.txt;
            document.getElementById('m-avatar').src = u.img || '';

            lBox.innerHTML = "";
            u.links.forEach(l => {
                if(l.url) {
                    lBox.innerHTML += `
                    <a href="${l.url}" target="_blank" class="block w-full p-4 rounded-xl text-center font-bold text-sm link-btn shadow-md" style="background: ${u.theme.lBg}; color: ${u.theme.lTxt}">
                        ${l.title}
                    </a>`;
                }
            });

            const v = document.getElementById('m-verified');
            if(u.ver) {
                v.className = `absolute bottom-1 right-1 w-7 h-7 rounded-full flex items-center justify-center border-4 border-white ${u.ver === 'blue' ? 'bg-blue-500' : 'bg-yellow-500'}`;
                v.innerHTML = u.ver === 'blue' ? '<i class="fas fa-check text-white text-[10px]"></i>' : '<i class="fas fa-star text-white text-[10px]"></i>';
                v.classList.remove('hidden');
            } else v.classList.add('hidden');
        }

        // Admin (ئاریان)
        function renderAdmin() {
            const list = document.getElementById('admin-users-list');
            list.innerHTML = "";
            Object.keys(db).forEach(k => {
                const u = db[k];
                list.innerHTML += `
                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/10 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img src="${u.img}" class="w-12 h-12 rounded-full object-cover bg-black">
                        <div>
                            <p class="font-bold text-sm">@${k}</p>
                            <p class="text-[10px] opacity-40">${u.f} ${u.l}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="adminAction('${k}','blue')" class="w-8 h-8 rounded-full bg-blue-500 text-[10px]"><i class="fas fa-check"></i></button>
                        <button onclick="adminAction('${k}','yellow')" class="w-8 h-8 rounded-full bg-yellow-500 text-[10px]"><i class="fas fa-star"></i></button>
                        <button onclick="adminAction('${k}','delete')" class="w-8 h-8 rounded-full bg-red-600 text-[10px]"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
        }
        function adminAction(u, act) {
            if(act === 'delete') { if(confirm('بسڕێتەوە؟')) delete db[u]; }
            else db[u].ver = act;
            save(); renderAdmin();
        }
        function adminSearch(q) {
            const cards = document.querySelectorAll('#admin-users-list > div');
            cards.forEach(c => c.style.display = c.innerText.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none');
        }

        function showSection(s) {
            ['projects', 'profile', 'designs'].forEach(x => document.getElementById('section-'+x).classList.add('hidden'));
            document.getElementById('section-'+s).classList.remove('hidden');
            toggleMenu();
        }

        function logout() { activeUser = null; save(); location.reload(); }
    </script>
</body>
</html>
