<!DOCTYPE html>
<html lang="ku" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurdAgencyLink | وێستگەی بەستەرەکان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; transition: background-color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(255, 255, 255, 0.03); }
        
        /* ڕەنگی سۆشیاڵ میدیاکان */
        .btn-facebook { background: #1877F2 !important; color: white !important; }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%) !important; color: white !important; }
        .btn-tiktok { background: #000000 !important; color: white !important; border: 1px solid #ff0050 !important; }
        .btn-snapchat { background: #FFFC00 !important; color: black !important; }
        .btn-whatsapp { background: #25D366 !important; color: white !important; }
        .btn-default { background: rgba(255,255,255,0.1); color: inherit; }
    </style>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-[#050505] dark:text-gray-100 min-h-screen">

    <header id="main-header" class="p-4 glass sticky top-0 z-50 border-b dark:border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-green-500 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">K</div>
            <span class="text-lg font-bold">KurdAgency<span class="text-green-500">Link</span></span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2 rounded-xl bg-gray-200 dark:bg-white/5">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:inline text-yellow-400"></i>
            </button>
            <button id="logout-btn" onclick="logout()" class="hidden px-4 py-2 bg-red-500/10 text-red-500 rounded-xl text-xs font-bold">دەرچوون</button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">
        
        <section id="auth-section" class="max-w-md mx-auto bg-white dark:bg-[#0d0d0d] p-8 rounded-[2.5rem] shadow-2xl border dark:border-white/5 mt-10">
            <div class="flex bg-gray-100 dark:bg-white/5 p-1 rounded-2xl mb-8">
                <button onclick="showAuth('login')" id="tab-login" class="flex-1 py-3 rounded-xl font-bold text-sm bg-green-500 text-white shadow-lg">چوونەژوورەوە</button>
                <button onclick="showAuth('reg')" id="tab-reg" class="flex-1 py-3 rounded-xl font-bold text-sm opacity-50">تۆمارکردن</button>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="l-user" placeholder="ئیمێڵ یان یوزەرنەیم" required class="w-full p-4 rounded-2xl border dark:bg-white/5 dark:border-white/10 outline-none">
                <input type="password" id="l-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl border dark:bg-white/5 dark:border-white/10 outline-none">
                <button class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold">چوونەژوورەوە</button>
            </form>
            <form id="reg-form" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                <input type="text" id="r-user" placeholder="یوزەرنەیم (بە ئینگلیزی)" required class="w-full p-4 rounded-2xl border dark:bg-white/5 dark:border-white/10 outline-none">
                <input type="password" id="r-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl border dark:bg-white/5 dark:border-white/10 outline-none">
                <button class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold">دروستکردنی هەژمار</button>
            </form>
        </section>

        <section id="user-panel" class="hidden grid lg:grid-cols-2 gap-10">
            <div class="space-y-6">
                <div class="glass p-8 rounded-[2.5rem]">
                    <h2 class="font-bold text-green-500 mb-6"><i class="fas fa-user-circle"></i> پڕۆفایلەکەت</h2>
                    <div class="flex items-center gap-5 mb-6">
                        <input type="file" id="u-img-in" onchange="updateImg(event)" class="hidden">
                        <label for="u-img-in" class="w-20 h-20 bg-green-500/10 rounded-full border-2 border-dashed border-green-500 flex items-center justify-center cursor-pointer overflow-hidden">
                            <img id="u-img-view" src="" class="hidden w-full h-full object-cover">
                            <i id="u-cam-icon" class="fas fa-camera text-green-500"></i>
                        </label>
                        <div class="flex-1">
                            <input type="text" id="u-name" oninput="live()" placeholder="ناوەکەت بە کوردی بنووسە" class="w-full p-3 rounded-xl border dark:bg-white/5 dark:border-white/10 outline-none mb-2">
                            <textarea id="u-bio" oninput="live()" placeholder="بایۆ بنووسە..." class="w-full p-3 rounded-xl border dark:bg-white/5 dark:border-white/10 outline-none h-20"></textarea>
                        </div>
                    </div>
                </div>

                <div class="glass p-8 rounded-[2.5rem]">
                    <h2 class="font-bold text-green-500 mb-4">لینکەکان (بە لۆگۆ و ڕەنگەوە)</h2>
                    <div id="links-editor" class="space-y-4"></div>
                    <button onclick="addLink()" class="w-full mt-4 p-4 border-2 border-dashed border-white/10 rounded-2xl text-xs font-bold opacity-50">+ زیاکردنی سۆشیاڵ میدیا</button>
                </div>

                <div class="p-2">
                    <button onclick="genLink()" class="w-full bg-green-500 text-white p-5 rounded-[2rem] font-bold shadow-xl">وەرگرتنی لینکی کۆتایی</button>
                    <div id="copy-box" class="hidden mt-4 p-5 border-2 border-dashed border-green-500 rounded-[2rem] bg-green-500/5 flex justify-between items-center">
                        <span id="final-url" class="text-[10px] font-bold truncate text-green-500 mr-2"></span>
                        <button onclick="copyIt()" class="bg-green-500 text-white px-5 py-2 rounded-xl text-[10px] font-bold shrink-0">کۆپی</button>
                    </div>
                </div>
            </div>

            <div class="hidden lg:block sticky top-28 h-fit">
                <div class="w-[300px] h-[600px] bg-black rounded-[3rem] border-[8px] border-[#1a1a1a] shadow-2xl relative overflow-hidden mx-auto">
                    <div id="p-screen" class="w-full h-full p-8 flex flex-col items-center bg-white dark:bg-[#0a0a0a] overflow-y-auto">
                        <img id="p-img" src="https://ui-avatars.com/api/?name=K" class="rounded-full shadow-lg w-24 h-24 object-cover">
                        <h2 id="p-name" class="mt-4 font-bold text-lg text-center">ناوەکەت</h2>
                        <p id="p-bio" class="text-[10px] opacity-50 text-center mt-2 px-2"></p>
                        <div id="p-links" class="w-full mt-8 space-y-3"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="public-view" class="hidden max-w-md mx-auto py-12 flex flex-col items-center min-h-screen">
            <img id="v-img" src="" class="rounded-full border-4 border-green-500 shadow-2xl w-32 h-32 object-cover">
            <h1 id="v-name" class="mt-6 text-2xl font-bold"></h1>
            <p id="v-bio" class="text-sm opacity-60 text-center mt-4 px-10"></p>
            <div id="v-links" class="w-full mt-10 space-y-4 px-6"></div>
        </section>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('KAL_PRO_DB')) || {};
        let activeUser = localStorage.getItem('KAL_SESSION') || null;

        const params = new URLSearchParams(window.location.search);
        const viewUser = params.get('u');

        // Platform configurations
        const platforms = {
            instagram: { name: 'ئینستاگرام', icon: 'fab fa-instagram', class: 'btn-instagram' },
            facebook: { name: 'فەیسبووک', icon: 'fab fa-facebook', class: 'btn-facebook' },
            tiktok: { name: 'تیکتۆک', icon: 'fab fa-tiktok', class: 'btn-tiktok' },
            snapchat: { name: 'سناپچات', icon: 'fab fa-snapchat', class: 'btn-snapchat' },
            whatsapp: { name: 'واتسئەپ', icon: 'fab fa-whatsapp', class: 'btn-whatsapp' },
            other: { name: 'ماڵپەڕ', icon: 'fas fa-globe', class: 'btn-default' }
        };

        if (viewUser && db[viewUser]) renderPublic(viewUser);
        else if (activeUser && db[activeUser]) showDashboard();

        function save() {
            localStorage.setItem('KAL_PRO_DB', JSON.stringify(db));
            if(activeUser) localStorage.setItem('KAL_SESSION', activeUser);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('k_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if(localStorage.getItem('k_theme') === 'light') document.documentElement.classList.remove('dark');

        function showAuth(t) {
            document.getElementById('login-form').classList.toggle('hidden', t === 'reg');
            document.getElementById('reg-form').classList.toggle('hidden', t === 'login');
            document.getElementById('tab-login').className = t === 'login' ? 'flex-1 py-3 rounded-xl font-bold text-sm bg-green-500 text-white shadow-lg' : 'flex-1 py-3 font-bold text-sm opacity-50';
            document.getElementById('tab-reg').className = t === 'reg' ? 'flex-1 py-3 rounded-xl font-bold text-sm bg-green-500 text-white shadow-lg' : 'flex-1 py-3 font-bold text-sm opacity-50';
        }

        function handleRegister(e) {
            e.preventDefault();
            const u = document.getElementById('r-user').value.toLowerCase().trim();
            if(db[u]) return alert("ئەم یوزەرە هەیە!");
            db[u] = { name: "ناوی تۆ", pass: document.getElementById('r-pass').value, bio: "بایۆ", img: "", links: [] };
            activeUser = u; save(); showDashboard();
        }

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('l-user').value.toLowerCase().trim();
            const p = document.getElementById('l-pass').value;
            if(db[u] && db[u].pass === p) { activeUser = u; save(); showDashboard(); }
            else alert("هەڵەیە!");
        }

        function showDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('user-panel').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            const u = db[activeUser];
            document.getElementById('u-name').value = u.name;
            document.getElementById('u-bio').value = u.bio;
            if(u.img) {
                document.getElementById('u-img-view').src = u.img;
                document.getElementById('u-img-view').classList.remove('hidden');
                document.getElementById('u-cam-icon').classList.add('hidden');
            }
            renderEditor();
            live();
        }

        function updateImg(e) {
            const r = new FileReader();
            r.onload = () => { db[activeUser].img = r.result; showDashboard(); };
            r.readAsDataURL(e.target.files[0]);
        }

        function addLink() {
            db[activeUser].links.push({ type: 'instagram', url: '', customName: 'ئینستاگرام' });
            save(); renderEditor(); live();
        }

        function renderEditor() {
            const area = document.getElementById('links-editor');
            area.innerHTML = "";
            db[activeUser].links.forEach((l, i) => {
                area.innerHTML += `
                    <div class="p-4 bg-white/5 rounded-2xl space-y-3 border border-white/5">
                        <div class="flex gap-2">
                            <select onchange="updateL(${i}, 'type', this.value)" class="bg-gray-800 p-2 rounded-lg text-[10px] outline-none">
                                ${Object.keys(platforms).map(p => `<option value="${p}" ${l.type === p ? 'selected' : ''}>${p}</option>`).join('')}
                            </select>
                            <input type="text" value="${l.customName}" oninput="updateL(${i}, 'customName', this.value)" placeholder="ناو بە کوردی" class="flex-1 bg-transparent border-b border-white/10 text-xs outline-none">
                            <button onclick="removeL(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                        <input type="text" value="${l.url}" oninput="updateL(${i}, 'url', this.value)" placeholder="لینکەکە لێرە دابنێ" class="w-full bg-white/5 p-2 rounded-lg text-[10px] outline-none">
                    </div>`;
            });
        }

        function updateL(i, k, v) { 
            db[activeUser].links[i][k] = v; 
            if(k === 'type') db[activeUser].links[i].customName = platforms[v].name;
            save(); renderEditor(); live(); 
        }
        function removeL(i) { db[activeUser].links.splice(i, 1); save(); renderEditor(); live(); }

        function live() {
            const u = db[activeUser];
            u.name = document.getElementById('u-name').value;
            u.bio = document.getElementById('u-bio').value;
            save();
            document.getElementById('p-name').innerText = u.name;
            document.getElementById('p-bio').innerText = u.bio;
            if(u.img) document.getElementById('p-img').src = u.img;
            
            const area = document.getElementById('p-links');
            area.innerHTML = "";
            u.links.forEach(l => {
                const p = platforms[l.type] || platforms.other;
                area.innerHTML += `
                    <div class="w-full p-3 rounded-xl flex items-center justify-center gap-2 text-[10px] font-bold ${p.class}">
                        <i class="${p.icon}"></i> ${l.customName}
                    </div>`;
            });
        }

        function genLink() {
            const url = window.location.origin + window.location.pathname + "?u=" + activeUser;
            document.getElementById('final-url').innerText = url;
            document.getElementById('copy-box').classList.remove('hidden');
        }

        function copyIt() { navigator.clipboard.writeText(document.getElementById('final-url').innerText); alert("کۆپی کرا!"); }

        function renderPublic(username) {
            const u = db[username];
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('auth-section').remove();
            document.getElementById('user-panel').remove();
            document.getElementById('public-view').classList.remove('hidden');

            document.getElementById('v-img').src = u.img || `https://ui-avatars.com/api/?name=${u.name}`;
            document.getElementById('v-name').innerText = u.name;
            document.getElementById('v-bio').innerText = u.bio;

            const area = document.getElementById('v-links');
            u.links.forEach(l => {
                if(l.url) {
                    const p = platforms[l.type] || platforms.other;
                    area.innerHTML += `
                        <a href="${l.url}" target="_blank" class="flex items-center justify-center gap-3 w-full p-5 rounded-[2rem] font-bold shadow-lg transition-transform hover:scale-[1.03] ${p.class}">
                            <i class="${p.icon} text-xl"></i>
                            <span class="text-lg">${l.customName}</span>
                        </a>`;
                }
            });
        }

        function logout() { localStorage.removeItem('KAL_SESSION'); location.href = location.origin + location.pathname; }
    </script>
</body>
</html>
