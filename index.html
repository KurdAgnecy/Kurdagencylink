<!DOCTYPE html>
<html lang="ku" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurdAgencyLink | سیستەمی بەستەرەکان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen transition-colors">

    <div id="public-view" class="hidden min-h-screen flex flex-col items-center p-6">
        <div class="mt-12 relative">
            <img id="pub-img" class="w-24 h-24 rounded-full border-4 border-white dark:border-gray-800 shadow-2xl object-cover">
            <div id="pub-badge" class="absolute -right-1 bottom-1 w-6 h-6 rounded-full flex items-center justify-center border-2 border-white dark:border-gray-800 shadow-lg"></div>
        </div>
        <h2 id="pub-name" class="font-bold text-2xl mt-4"></h2>
        <p id="pub-bio" class="text-xs opacity-60 font-bold uppercase tracking-widest mt-1"></p>
        
        <div id="pub-links" class="w-full max-w-sm mt-8 space-y-4"></div>
        
        <div class="mt-auto py-10 opacity-30 text-[10px] font-bold">CREATED BY KURDAGENCYLINK</div>
    </div>

    <div id="app-interface">
        <header class="p-4 bg-white dark:bg-gray-900 shadow-sm flex justify-between items-center sticky top-0 z-[100] border-b dark:border-gray-800">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center text-white font-bold text-xl">K</div>
                <h1 class="text-xl font-bold">KurdAgency<span class="text-green-500">Link</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-800 border dark:border-gray-700">
                    <i class="fas fa-adjust"></i>
                </button>
                <button id="nav-logout" onclick="location.reload()" class="hidden px-4 py-2 bg-red-500 text-white rounded-xl text-xs font-bold">چوونەدەرەوە</button>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8 max-w-6xl">
            <section id="auth-box" class="max-w-md mx-auto bg-white dark:bg-gray-900 p-8 rounded-[2rem] shadow-2xl border dark:border-gray-800">
                <div class="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-2xl mb-8">
                    <button onclick="toggleAuth('login')" id="btn-login" class="flex-1 py-3 rounded-xl font-bold text-sm bg-white dark:bg-gray-700 shadow">چوونەژوورەوە</button>
                    <button onclick="toggleAuth('reg')" id="btn-reg" class="flex-1 py-3 rounded-xl font-bold text-sm opacity-50">دروستکردنی هەژمار</button>
                </div>

                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="text" id="l-id" placeholder="ئیمێڵ یان ژمارە" required class="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 outline-none">
                    <input type="password" id="l-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 outline-none">
                    <button class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold shadow-lg shadow-green-500/30">چوونەژوورەوە</button>
                </form>

                <form id="form-reg" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="r-fn" placeholder="ناوی یەکەم" required class="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 outline-none">
                        <input type="text" id="r-ln" placeholder="ناوی دووەم" required class="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 outline-none">
                    </div>
                    <input type="text" id="r-user" placeholder="یوزەرنەیم (بۆ ناو لینکەکە)" required class="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 outline-none">
                    <input type="text" id="r-id" placeholder="ئیمێڵ یان ژمارە" required class="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 outline-none">
                    <input type="password" id="r-pass" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 outline-none">
                    <select id="r-cat" class="w-full p-4 rounded-2xl border dark:bg-gray-800 dark:border-gray-700 outline-none">
                        <option value="tech">تەکنەلۆجیا</option>
                        <option value="food">خواردنگە</option>
                        <option value="other">گشتی</option>
                    </select>
                    <button class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold">تۆمارکردن</button>
                </form>
            </section>

            <section id="dashboard" class="hidden grid lg:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div class="bg-white dark:bg-gray-900 p-6 rounded-[2rem] shadow-xl border dark:border-gray-800">
                        <h2 class="font-bold mb-4">دەستکاری پرۆفایل</h2>
                        <input type="file" onchange="updateImg(event)" class="text-xs mb-4">
                        <input type="text" id="u-fn" oninput="saveAndSync()" placeholder="ناو" class="w-full p-3 mb-3 rounded-xl border dark:bg-gray-800 outline-none">
                        <input type="text" id="u-bio" oninput="saveAndSync()" placeholder="ناونیشانی کار" class="w-full p-3 rounded-xl border dark:bg-gray-800 outline-none">
                    </div>

                    <div class="bg-white dark:bg-gray-900 p-6 rounded-[2rem] shadow-xl border dark:border-gray-800">
                        <h2 class="font-bold mb-4">سۆشیاڵ میدیاکانت</h2>
                        <div class="flex gap-2 mb-4">
                            <select id="new-link-type" class="flex-1 p-3 rounded-xl border dark:bg-gray-800">
                                <option value="fb">Facebook</option>
                                <option value="ig">Instagram</option>
                                <option value="sc">Snapchat</option>
                                <option value="tt">TikTok</option>
                                <option value="wa">WhatsApp</option>
                            </select>
                            <button onclick="addLink()" class="bg-green-500 text-white px-6 rounded-xl font-bold">+</button>
                        </div>
                        <div id="links-input-list" class="space-y-2"></div>
                    </div>

                    <div class="p-4 bg-green-500 text-white rounded-[2rem] shadow-xl shadow-green-500/20">
                        <button onclick="showFinalLink()" class="w-full font-bold text-lg">دروستکردنی لینک</button>
                        <div id="final-link-display" class="hidden mt-4 p-4 bg-white/20 rounded-xl flex items-center justify-between">
                            <span id="the-url" class="text-xs font-mono select-all"></span>
                            <button onclick="copyURL()" class="bg-white text-green-600 px-3 py-1 rounded-lg text-[10px] font-bold">کۆپی</button>
                        </div>
                        <p class="text-[10px] text-center mt-2 opacity-80">تێبینی: ئەم لینکە لە هەموو شوێنێک ئیش دەکات.</p>
                    </div>
                </div>

                <div class="flex justify-center">
                    <div class="w-[300px] h-[600px] bg-black rounded-[3rem] border-[8px] border-gray-900 shadow-2xl relative overflow-hidden">
                        <div id="preview-box" class="w-full h-full p-6 flex flex-col items-center bg-white dark:bg-gray-950 overflow-y-auto">
                            <img id="p-img" src="https://ui-avatars.com/api/?name=User&background=10b981&color=fff" class="w-20 h-20 rounded-full mt-10 object-cover border-2 border-green-500">
                            <h2 id="p-name" class="font-bold text-lg mt-4 text-center">ناو</h2>
                            <p id="p-bio" class="text-[10px] opacity-60 text-center uppercase">BIO</p>
                            <div id="p-links" class="w-full mt-8 space-y-3"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- سیستەمی داتابەیس ---
        if(!localStorage.getItem('klink_v2')) localStorage.setItem('klink_v2', JSON.stringify({}));
        let db = JSON.parse(localStorage.getItem('klink_v2'));
        let activeUser = null;

        // --- پشکنینی ئەوەی ئایا لینکەکە کراوەتەوە؟ ---
        const urlParams = new URLSearchParams(window.location.search);
        const viewUser = urlParams.get('u');

        if(viewUser && db[viewUser]) {
            renderPublicPage(viewUser);
        }

        function renderPublicPage(username) {
            document.getElementById('app-interface').style.display = 'none';
            document.getElementById('public-view').classList.remove('hidden');
            const u = db[username];
            
            document.getElementById('pub-img').src = u.img || `https://ui-avatars.com/api/?name=${u.fn}&background=10b981&color=fff`;
            document.getElementById('pub-name').innerText = u.fn + " " + u.ln;
            document.getElementById('pub-bio').innerText = u.bio;
            
            const linksArea = document.getElementById('pub-links');
            linksArea.innerHTML = "";
            for(let k in u.links) {
                if(u.links[k]) {
                    linksArea.innerHTML += `
                        <a href="${u.links[k]}" target="_blank" class="block w-full py-4 bg-green-500 text-white rounded-2xl text-center font-bold shadow-lg transform active:scale-95 transition-all">
                            ${k.toUpperCase()}
                        </a>`;
                }
            }
            
            // دیزاینی تایبەت بە کارەکە
            if(u.cat === 'tech') document.body.className = "bg-slate-950 text-cyan-400";
            if(u.cat === 'food') document.body.className = "bg-orange-50 text-orange-950";
        }

        // --- ئیشپێکردنی دوگمەکان ---
        function toggleAuth(t) {
            document.getElementById('form-login').classList.toggle('hidden', t === 'reg');
            document.getElementById('form-reg').classList.toggle('hidden', t === 'login');
            document.getElementById('btn-login').className = t === 'login' ? 'flex-1 py-3 rounded-xl font-bold bg-white dark:bg-gray-700 shadow' : 'flex-1 py-3 font-bold opacity-50';
            document.getElementById('btn-reg').className = t === 'reg' ? 'flex-1 py-3 rounded-xl font-bold bg-white dark:bg-gray-700 shadow' : 'flex-1 py-3 font-bold opacity-50';
        }

        function handleRegister(e) {
            e.preventDefault();
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            if(db[u]) return alert("ئەم یوزەرنەیمە گیراوە!");
            db[u] = {
                fn: document.getElementById('r-fn').value,
                ln: document.getElementById('r-ln').value,
                id: document.getElementById('r-id').value,
                pass: document.getElementById('r-pass').value,
                cat: document.getElementById('r-cat').value,
                bio: "KurdAgency User", img: "", links: {}
            };
            localStorage.setItem('klink_v2', JSON.stringify(db));
            alert("تۆمارکرا! بچۆ ژوورەوە.");
            toggleAuth('login');
        }

        function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('l-id').value;
            const pass = document.getElementById('l-pass').value;
            for(let u in db) {
                if(db[u].id === id && db[u].pass === pass) {
                    activeUser = u;
                    loadDashboard();
                    return;
                }
            }
            alert("هەڵەیە!");
        }

        function loadDashboard() {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('nav-logout').classList.remove('hidden');
            const u = db[activeUser];
            document.getElementById('u-fn').value = u.fn;
            document.getElementById('u-bio').value = u.bio;
            renderInputLinks();
            updatePreview();
        }

        function addLink() {
            const type = document.getElementById('new-link-type').value;
            db[activeUser].links[type] = "";
            renderInputLinks();
            saveAndSync();
        }

        function renderInputLinks() {
            const area = document.getElementById('links-input-list');
            area.innerHTML = "";
            for(let k in db[activeUser].links) {
                area.innerHTML += `
                    <div class="flex gap-2">
                        <input type="text" value="${db[activeUser].links[k]}" oninput="updateLinkVal('${k}', this.value)" placeholder="${k}" class="flex-1 p-3 bg-gray-100 dark:bg-gray-800 rounded-xl text-xs outline-none">
                        <button onclick="delLink('${k}')" class="text-red-500">X</button>
                    </div>`;
            }
        }

        function updateLinkVal(k, v) { db[activeUser].links[k] = v; saveAndSync(); }
        function delLink(k) { delete db[activeUser].links[k]; renderInputLinks(); saveAndSync(); }

        function updateImg(e) {
            const r = new FileReader();
            r.onload = () => { db[activeUser].img = r.result; saveAndSync(); };
            r.readAsDataURL(e.target.files[0]);
        }

        function saveAndSync() {
            if(activeUser) {
                db[activeUser].fn = document.getElementById('u-fn').value;
                db[activeUser].bio = document.getElementById('u-bio').value;
                localStorage.setItem('klink_v2', JSON.stringify(db));
                updatePreview();
            }
        }

        function updatePreview() {
            const u = db[activeUser];
            document.getElementById('p-name').innerText = u.fn;
            document.getElementById('p-bio').innerText = u.bio;
            document.getElementById('p-img').src = u.img || `https://ui-avatars.com/api/?name=${u.fn}&background=10b981&color=fff`;
            
            const pLinks = document.getElementById('p-links');
            pLinks.innerHTML = "";
            for(let k in u.links) {
                if(u.links[k]) pLinks.innerHTML += `<div class="w-full py-3 bg-green-500 text-white rounded-xl text-center text-xs font-bold">${k.toUpperCase()}</div>`;
            }
        }

        function showFinalLink() {
            // دروستکردنی لینکی ڕاستەقینە کە ئیش بکات
            const baseUrl = window.location.origin + window.location.pathname;
            const finalUrl = `${baseUrl}?u=${activeUser}`;
            document.getElementById('the-url').innerText = finalUrl;
            document.getElementById('final-link-display').classList.remove('hidden');
        }

        function copyURL() {
            navigator.clipboard.writeText(document.getElementById('the-url').innerText);
            alert("لینکەکە کۆپی کرا! ئێستا دەتوانیت بۆ هەر کەسێکی بنێریت.");
        }
    </script>
</body>
</html>
