<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurdAgency - Bio Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background-color: #000; color: #fff; }
        .side-menu { position: fixed; top: 0; right: 0; height: 100%; width: 280px; background: #111; z-index: 1000; transition: 0.4s ease; transform: translateX(100%); border-l: 1px solid #222; }
        .side-menu.active { transform: translateX(0); }
        .phone-preview { width: 320px; height: 620px; border: 10px solid #1a1a1a; border-radius: 2.5rem; background: #fff; overflow-y: auto; position: sticky; top: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .design-item { cursor: pointer; border: 2px solid transparent; transition: 0.2s; border-radius: 12px; overflow: hidden; height: 80px; }
        .design-item:hover { border-color: #22c55e; transform: translateY(-2px); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }
        .success-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 15px 30px; border-radius: 50px; font-bold; z-index: 2000; display: none; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="success-msg" class="success-popup">پیرۆزە! هەژمارەکەت دروستکرا 😍</div>

    <nav class="p-4 border-b border-white/10 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-lg z-[500]">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="text-2xl text-green-500"><i class="fas fa-bars"></i></button>
            <h1 class="text-xl font-bold italic">KurdAgency<span class="text-green-500">.link</span></h1>
        </div>
        <div id="admin-badge" class="hidden px-4 py-1 bg-blue-600 rounded-full text-[10px] font-bold">MANAGER</div>
    </nav>

    <div id="side-menu" class="side-menu p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold text-green-500">مینیو</h2>
            <button onclick="toggleMenu()" class="text-red-500 text-2xl"><i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-4">
            <button onclick="switchTab('projects')" class="w-full text-right p-4 rounded-2xl bg-white/5 hover:bg-green-500/20 flex items-center gap-4 transition"><i class="fas fa-link text-blue-400"></i> پڕۆژەکانم</button>
            <button onclick="switchTab('designs')" class="w-full text-right p-4 rounded-2xl bg-white/5 hover:bg-green-500/20 flex items-center gap-4 transition"><i class="fas fa-paint-brush text-purple-400"></i> دیزاینەکان</button>
            <button onclick="switchTab('profile')" class="w-full text-right p-4 rounded-2xl bg-white/5 hover:bg-green-500/20 flex items-center gap-4 transition"><i class="fas fa-user-circle text-orange-400"></i> پڕۆفایل</button>
            <hr class="border-white/5 my-4">
            <button onclick="logout()" class="w-full text-right p-4 rounded-2xl text-red-500 hover:bg-red-500/10 flex items-center gap-4 transition"><i class="fas fa-sign-out-alt"></i> دەرچوون</button>
        </div>
    </div>

    <main class="container mx-auto p-4">

        <section id="auth-section" class="max-w-md mx-auto mt-10 pb-20">
            <div class="bg-[#111] p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
                <div class="flex bg-black p-1 rounded-2xl mb-8">
                    <button onclick="authToggle('login')" id="btn-login" class="flex-1 py-3 rounded-xl bg-green-500 font-bold transition">چوونەژوورەوە</button>
                    <button onclick="authToggle('reg')" id="btn-reg" class="flex-1 py-3 rounded-xl opacity-50 font-bold transition">تۆمارکردن</button>
                </div>

                <form id="login-form" onsubmit="doLogin(event)" class="space-y-4">
                    <input type="email" id="le" placeholder="ئیمێڵ" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-green-500 transition">
                    <input type="password" id="lp" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-green-500 transition">
                    <button class="w-full bg-green-500 p-4 rounded-2xl font-bold shadow-lg shadow-green-500/20">چوونەژوورەوە</button>
                </form>

                <form id="reg-form" onsubmit="doReg(event)" class="space-y-4 hidden">
                    <div class="flex justify-center mb-6">
                        <label class="w-24 h-24 rounded-full bg-white/5 border-2 border-dashed border-green-500 flex items-center justify-center cursor-pointer overflow-hidden relative group">
                            <img id="reg-prev" class="hidden w-full h-full object-cover">
                            <i id="reg-icon" class="fas fa-camera text-2xl opacity-30"></i>
                            <input type="file" onchange="previewAvatar(event)" class="hidden" id="ri">
                        </label>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="rf" placeholder="ناوی یەکەم" required class="p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                        <input type="text" id="rl" placeholder="ناوی دووەم" required class="p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    </div>
                    <input type="text" id="ru" placeholder="یوزەرنەیم (بێ دووبارە)" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <input type="email" id="re" placeholder="ئیمێڵ" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <input type="password" id="rp" placeholder="پاسۆرد" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none">
                    <button class="w-full bg-green-500 p-4 rounded-2xl font-bold">دروستکردنی هەژمار</button>
                </form>
            </div>
        </section>

        <section id="app-section" class="hidden grid lg:grid-cols-2 gap-10 items-start mt-6">
            
            <div class="space-y-6">
                <div id="tab-projects" class="space-y-4">
                    <div class="bg-[#111] p-6 rounded-[2.5rem] border border-white/10">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold">پڕۆژەکانم</h2>
                            <button onclick="addLink()" class="bg-green-500 px-6 py-2 rounded-xl text-xs font-bold transition hover:scale-105">+ نوێ</button>
                        </div>
                        <div id="links-container" class="space-y-4 max-h-[400px] overflow-y-auto custom-scroll pr-2"></div>
                    </div>

                    <div class="bg-blue-600/10 border border-blue-500/20 p-8 rounded-[2.5rem] relative overflow-hidden">
                        <h3 class="text-xl font-bold text-blue-400 italic">سەحی شین و ئەستێرە</h3>
                        <p class="text-xs mt-2 opacity-70">بڕی ١,٥٠٠ دینار بنێرە بۆ: 07729585559</p>
                        <a id="wa-link" href="#" target="_blank" class="block w-full bg-blue-600 text-white p-3 rounded-xl mt-4 text-center font-bold text-sm hover:bg-blue-700 transition">ناردنی وێنەی پسوڵە (WhatsApp)</a>
                    </div>
                </div>

                <div id="tab-profile" class="hidden bg-[#111] p-10 rounded-[2.5rem] border border-white/10 text-center space-y-6">
                    <img id="p-img" class="w-28 h-28 rounded-full mx-auto border-4 border-green-500 object-cover shadow-2xl">
                    <div>
                        <h2 id="p-full" class="text-2xl font-bold"></h2>
                        <p id="p-user" class="text-green-500 font-bold italic"></p>
                    </div>
                    <div class="text-right space-y-3 bg-black/40 p-6 rounded-3xl border border-white/5">
                        <p class="text-sm opacity-50">ئیمێڵ: <span id="p-email" class="text-white opacity-100 float-left"></span></p>
                        <p class="text-sm opacity-50">پاسۆرد: <span id="p-pass" class="text-white opacity-100 float-left"></span></p>
                    </div>
                </div>

                <div id="tab-designs" class="hidden space-y-4">
                    <h2 class="text-xl font-bold px-4 text-green-500">دیزاینی لینکەکان هەڵبژێرە (٥٠ نموونە)</h2>
                    <div id="designs-grid" class="grid grid-cols-2 gap-4 p-2 max-h-[500px] overflow-y-auto custom-scroll"></div>
                </div>
            </div>

            <div class="hidden lg:flex justify-center">
                <div id="mobile-ui" class="phone-preview p-6 flex flex-col items-center">
                    <div class="relative mt-8">
                        <img id="m-img" class="w-24 h-24 rounded-full border-4 border-white/20 object-cover bg-gray-200">
                        <div id="m-badge" class="absolute bottom-0 right-0 w-8 h-8 rounded-full flex items-center justify-center border-4 border-white hidden"></div>
                    </div>
                    <h2 id="m-name" class="mt-4 font-bold text-xl text-gray-900"></h2>
                    <div id="m-links" class="w-full mt-10 space-y-4 pb-10"></div>
                </div>
            </div>

        </section>

        <section id="admin-panel" class="hidden space-y-6">
            <div class="bg-indigo-600/20 p-8 rounded-[2.5rem] border border-indigo-500/30 flex flex-col md:flex-row justify-between items-center gap-6">
                <h2 class="text-2xl font-bold italic">بەڕێوەبردنی ئاریان</h2>
                <div class="relative w-full md:w-80">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 opacity-40"></i>
                    <input type="text" oninput="adminFilter(this.value)" placeholder="سێرچ بۆ یوزەرنەیم..." class="w-full p-4 pl-12 rounded-2xl bg-black/50 border border-white/10 outline-none focus:border-indigo-500">
                </div>
            </div>
            <div id="admin-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 pb-20"></div>
        </section>

    </main>

    <script>
        // Database
        let users = JSON.parse(localStorage.getItem('KA_V6_DB')) || {};
        let session = localStorage.getItem('KA_V6_SESS') || null;

        // Styles
        const designs = [];
        const baseColors = [
            {bg: '#ffffff', t: '#000', lb: '#f3f3f1', lt: '#000', n: 'سپی کلاسیک'},
            {bg: '#000000', t: '#fff', lb: '#1a1a1a', lt: '#fff', n: 'تاریکی'},
            {bg: 'linear-gradient(135deg, #1e3c72, #2a5298)', t: '#fff', lb: 'rgba(255,255,255,0.1)', lt: '#fff', n: 'شینی شاهانە'},
            {bg: '#004d40', t: '#fff', lb: '#00695c', lt: '#fff', n: 'سەوزی مۆر'},
            {bg: 'linear-gradient(45deg, #ff9a9e, #fad0c4)', t: '#d63384', lb: '#fff', lt: '#d63384', n: 'پەمەیی'},
            {bg: '#121212', t: '#00ff00', lb: '#000', lt: '#00ff00', n: 'ماتریکس'}
        ];
        for(let i=0; i<50; i++) {
            let c = baseColors[i % baseColors.length];
            designs.push({...c, id: i, n: c.n + " " + (i+1)});
        }

        // Functions
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        
        function authToggle(t) {
            document.getElementById('login-form').classList.toggle('hidden', t==='reg');
            document.getElementById('reg-form').classList.toggle('hidden', t==='login');
            document.getElementById('btn-login').className = t==='login' ? 'flex-1 py-3 rounded-xl bg-green-500 font-bold transition' : 'flex-1 py-3 rounded-xl opacity-50 font-bold transition';
            document.getElementById('btn-reg').className = t==='reg' ? 'flex-1 py-3 rounded-xl bg-green-500 font-bold transition' : 'flex-1 py-3 rounded-xl opacity-50 font-bold transition';
        }

        function previewAvatar(e) {
            const r = new FileReader();
            r.onload = () => {
                document.getElementById('reg-prev').src = r.result;
                document.getElementById('reg-prev').classList.remove('hidden');
                document.getElementById('reg-icon').classList.add('hidden');
            };
            r.readAsDataURL(e.target.files[0]);
        }

        function doReg(e) {
            e.preventDefault();
            const u = document.getElementById('ru').value.toLowerCase().trim();
            if(users[u]) return alert("ببوورە ئەم یوزەرنەیمە گیراوە!");
            
            users[u] = {
                f: document.getElementById('rf').value,
                l: document.getElementById('rl').value,
                e: document.getElementById('re').value,
                p: document.getElementById('rp').value,
                img: document.getElementById('reg-prev').src || '',
                theme: designs[0],
                ver: null,
                links: []
            };
            session = u; save(); 
            document.getElementById('success-msg').style.display = 'block';
            setTimeout(() => location.reload(), 1500);
        }

        function doLogin(e) {
            e.preventDefault();
            const em = document.getElementById('le').value;
            const ps = document.getElementById('lp').value;
            if(em === 'aryan@gmail.com' && ps === '12345678') { session = 'ADMIN'; save(); location.reload(); return; }
            const found = Object.keys(users).find(k => users[k].e === em && users[k].p === ps);
            if(found) { session = found; save(); location.reload(); }
            else alert("ئیمێڵ یان پاسۆرد هەڵەیە!");
        }

        function save() { 
            localStorage.setItem('KA_V6_DB', JSON.stringify(users)); 
            localStorage.setItem('KA_V6_SESS', session); 
        }

        if(session) {
            document.getElementById('auth-section').classList.add('hidden');
            if(session === 'ADMIN') {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-badge').classList.remove('hidden');
                renderAdmin();
            } else {
                document.getElementById('app-section').classList.remove('hidden');
                loadUserData();
            }
        }

        function loadUserData() {
            const u = users[session];
            document.getElementById('p-full').innerText = u.f + " " + u.l;
            document.getElementById('p-user').innerText = "@" + session;
            document.getElementById('p-email').innerText = u.e;
            document.getElementById('p-pass').innerText = u.p;
            document.getElementById('p-img').src = u.img || '';
            document.getElementById('wa-link').href = "https://wa.me/9647729585559?text=بۆ-سەحی-شین-یوزەر: " + session;
            renderLinks();
            renderDesigns();
            updatePreview();
        }

        function addLink() {
            users[session].links.unshift({ title: 'ناوی لینک', url: '' });
            save(); renderLinks();
        }

        function renderLinks() {
            const container = document.getElementById('links-container');
            container.innerHTML = "";
            users[session].links.forEach((l, i) => {
                container.innerHTML += `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 space-y-2">
                    <div class="flex justify-between items-center">
                        <input type="text" value="${l.title}" oninput="updateLink(${i},'title',this.value)" class="bg-transparent border-b border-white/10 outline-none text-sm font-bold w-full">
                        <button onclick="delLink(${i})" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                    <input type="text" value="${l.url}" oninput="updateLink(${i},'url',this.value)" placeholder="لینکەکە لێرە دابنێ..." class="w-full bg-black/40 p-2.5 rounded-xl text-xs outline-none focus:border-green-500 border border-transparent transition">
                </div>`;
            });
            updatePreview();
        }

        function updateLink(i, k, v) { users[session].links[i][k] = v; save(); updatePreview(); }
        function delLink(i) { users[session].links.splice(i, 1); save(); renderLinks(); }

        function renderDesigns() {
            const grid = document.getElementById('designs-grid');
            grid.innerHTML = "";
            designs.forEach(d => {
                grid.innerHTML += `
                <div onclick="setDesign(${d.id})" class="design-item relative" style="background: ${d.bg}">
                    <div class="absolute inset-0 flex flex-col items-center justify-center p-2">
                        <div class="w-10 h-2 rounded-full mb-1" style="background: ${d.lb}"></div>
                        <div class="w-10 h-2 rounded-full mb-1 opacity-50" style="background: ${d.lb}"></div>
                        <span class="text-[7px] font-bold" style="color: ${d.t}">${d.n}</span>
                    </div>
                </div>`;
            });
        }

        function setDesign(id) { users[session].theme = designs.find(x => x.id === id); save(); updatePreview(); }

        function updatePreview() {
            const u = users[session];
            const ui = document.getElementById('mobile-ui');
            const name = document.getElementById('m-name');
            const box = document.getElementById('m-links');
            
            ui.style.background = u.theme.bg;
            name.innerText = u.f + " " + u.l;
            name.style.color = u.theme.t;
            document.getElementById('m-img').src = u.img || '';

            box.innerHTML = "";
            u.links.forEach(l => {
                if(l.url) box.innerHTML += `
                <a href="${l.url}" target="_blank" class="block w-full p-4 rounded-xl text-center font-bold text-sm shadow-lg transition hover:scale-[1.02]" style="background: ${u.theme.lb}; color: ${u.theme.lt}">
                    ${l.title}
                </a>`;
            });

            const b = document.getElementById('m-badge');
            if(u.ver) {
                b.className = `absolute bottom-0 right-0 w-8 h-8 rounded-full flex items-center justify-center border-4 border-white ${u.ver === 'blue' ? 'bg-blue-500' : 'bg-yellow-500'}`;
                b.innerHTML = u.ver === 'blue' ? '<i class="fas fa-check text-white text-xs"></i>' : '<i class="fas fa-star text-white text-[10px]"></i>';
                b.classList.remove('hidden');
            } else b.classList.add('hidden');
        }

        // Admin Actions
        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            Object.keys(users).forEach(k => {
                const u = users[k];
                list.innerHTML += `
                <div class="bg-white/5 p-6 rounded-[2.5rem] border border-white/10 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img src="${u.img}" class="w-12 h-12 rounded-full object-cover bg-black border border-white/10">
                        <div>
                            <p class="font-bold">@${k}</p>
                            <p class="text-[10px] opacity-40">${u.f} ${u.l}</p>
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="adminSet('${k}','blue')" class="w-8 h-8 rounded-full bg-blue-500 text-[8px]"><i class="fas fa-check"></i></button>
                        <button onclick="adminSet('${k}','yellow')" class="w-8 h-8 rounded-full bg-yellow-500 text-[8px]"><i class="fas fa-star"></i></button>
                        <button onclick="adminDel('${k}')" class="w-8 h-8 rounded-full bg-red-600 text-[8px]"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
        }
        function adminSet(u, v) { users[u].ver = v; save(); renderAdmin(); }
        function adminDel(u) { if(confirm('بسڕێتەوە؟')) { delete users[u]; save(); renderAdmin(); } }
        function adminFilter(q) {
            const cards = document.querySelectorAll('#admin-list > div');
            cards.forEach(c => c.style.display = c.innerText.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none');
        }

        function switchTab(t) {
            ['projects', 'profile', 'designs'].forEach(x => document.getElementById('tab-'+x).classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            toggleMenu();
        }

        function logout() { session = null; save(); location.reload(); }
    </script>
</body>
</html>
